<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sân Chơi Toán Học — Luyện tập</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
  :root{--paper:#FBFAF4;--ink:#1C2438;--indigo:#2A3B8F;--indigo-soft:#6B7BD6;--tangerine:#FF7A1A;
    --tang-d:#C95C09;--emerald:#1FA36B;--emerald-d:#15784E;--red:#C0392B;--gold:#E8A317;--line:#E4E0D4;--muted:#6A7184;
    --teal:#0E6F5C;--violet:#5B3FBF}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:"Be Vietnam Pro",system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(120% 80% at 75% -10%,#EAF2FF 0%,transparent 55%),var(--paper);min-height:100vh}
  .wrap{max-width:900px;margin:0 auto;padding:18px 14px 50px;position:relative}
  .wrap::before{content:"";position:absolute;left:0;right:0;top:0;height:5px;border-radius:3px;
    background:linear-gradient(90deg,var(--indigo),var(--tangerine))}
  h1{font-family:"Baloo 2",sans-serif;font-weight:700;color:var(--indigo);letter-spacing:-.5px;margin:0}
  h1 .dot{color:var(--tangerine)}
  h2{font-family:"Baloo 2",sans-serif;color:var(--indigo);font-size:20px;margin:0 0 12px}
  h2 small{font-size:12px;color:var(--muted);font-weight:500;font-family:"Be Vietnam Pro"}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin:10px 0 14px;flex-wrap:wrap;gap:8px}
  .who{font-size:13px;color:var(--muted);font-weight:600}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;
    box-shadow:0 10px 30px -22px rgba(42,59,143,.4)}
  label{display:block;font-size:13px;font-weight:600;margin:10px 0 5px}
  input,select,textarea{width:100%;font-family:inherit;font-size:14px;padding:10px 12px;border:1px solid var(--line);
    border-radius:10px;background:#FCFCFE}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--indigo-soft)}
  textarea{min-height:120px;resize:vertical;font-size:13px}
  button{font-family:"Baloo 2",sans-serif;font-weight:600;font-size:15px;border:none;border-radius:11px;
    padding:11px 16px;cursor:pointer;transition:transform .08s}
  button:active{transform:translateY(1px)}
  .pri{background:var(--tangerine);color:#fff;box-shadow:0 4px 0 var(--tang-d)}
  .pri:active{box-shadow:0 2px 0 var(--tang-d)}
  .sec{background:#EEF1FB;color:var(--indigo)}
  .ok{background:var(--emerald);color:#fff;box-shadow:0 4px 0 var(--emerald-d)}
  .danger{background:#FDECEC;color:var(--red)}
  .ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .tabs button{background:#fff;border:1px solid var(--line);color:var(--ink);font-size:13.5px;padding:9px 13px}
  .tabs button.on{background:var(--indigo);color:#fff;border-color:var(--indigo)}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
  th,td{border:1px solid var(--line);padding:7px 9px;text-align:left}
  th{background:#F4F6FB;font-weight:600;color:var(--indigo)}
  tr:hover td{background:#FAFBFF}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;background:#EEF1FB;color:var(--indigo)}
  .pill.g{background:#E8F7EE;color:var(--emerald-d)}
  .pill.r{background:#FDECEC;color:var(--red)}
  .pill.y{background:#FDF6E8;color:#8A6212}
  .muted{color:var(--muted);font-size:13px}
  .big{font-family:"Baloo 2",sans-serif;font-size:30px;color:var(--indigo)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
  .stat{border-radius:12px;padding:14px;text-align:center;background:#F4F6FB}
  .stat .n{font-family:"Baloo 2",sans-serif;font-size:25px;color:var(--indigo)}
  .stat .l{font-size:11.5px;color:var(--muted);font-weight:600}
  .stat.c1{background:#EEF1FB}.stat.c1 .n{color:var(--indigo)}
  .stat.c2{background:#FFF1E5}.stat.c2 .n{color:var(--tang-d)}
  .stat.c3{background:#E8F7EE}.stat.c3 .n{color:var(--emerald-d)}
  .stat.c4{background:#FDF6E8}.stat.c4 .n{color:var(--gold)}
  /* Biểu đồ cột ngang thuần CSS */
  .hbar{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:12.5px}
  .hbar .lab{width:92px;font-weight:600;color:var(--muted);text-align:right;flex:none}
  .hbar .track{flex:1;height:18px;background:#EEF0F7;border-radius:9px;overflow:hidden}
  .hbar .fill{height:100%;border-radius:9px;background:var(--indigo);transition:width .4s;
    display:flex;align-items:center;justify-content:flex-end;color:#fff;font-size:10.5px;font-weight:700;padding-right:6px}
  .hbar .fill.o{background:var(--tangerine)} .hbar .fill.e{background:var(--emerald)}
  .hbar .fill.r{background:var(--red)} .hbar .fill.y{background:var(--gold)}
  /* thanh tiến độ nhỏ trong hàng game */
  .mini{position:relative;height:8px;border-radius:5px;background:#EEF0F7;overflow:hidden;margin-top:5px}
  .mini .f{position:absolute;left:0;top:0;bottom:0;background:var(--emerald);border-radius:5px}
  .mini .f.low{background:var(--tangerine)}
  .mini .t{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--indigo)}
  .qbox{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
  .qbox .qt{font-weight:600;margin-bottom:8px}
  .opt{display:block;padding:8px 10px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;cursor:pointer;font-size:14px;font-weight:400}
  .opt.sel{border-color:var(--indigo);background:#EEF1FB}
  .dsrow{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 0;border-bottom:1px dashed var(--line)}
  .dsrow .b{display:flex;gap:6px;flex:none}
  .dsrow .b button{padding:6px 12px;font-size:13px;background:#fff;border:1px solid var(--line);color:var(--ink)}
  .dsrow .b button.t{background:var(--emerald);color:#fff;border-color:var(--emerald)}
  .dsrow .b button.f{background:var(--red);color:#fff;border-color:var(--red)}
  .timer{font-family:"Baloo 2",sans-serif;font-weight:700;font-size:18px}
  .timer.warn{color:var(--red)}
  .banner{background:#FDF6E8;border:1px solid #F3DCA6;color:#8A6212;border-radius:12px;padding:12px 14px;font-size:13px;margin-bottom:14px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1C2438;color:#fff;
    padding:12px 18px;border-radius:12px;font-size:14px;z-index:50;opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1}
  .msg{border-left:3px solid var(--indigo);background:#F7F9FF;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:14px}
  .msg .meta{font-size:11px;color:var(--muted)}
  .center{text-align:center}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .chips .pill{font-size:12px;padding:4px 10px}
  .stars-gold{color:var(--gold);font-weight:700}
  /* Trang chủ */
  .hero{text-align:center;padding:34px 0 18px}
  .hero h1{font-size:clamp(32px,6vw,46px)}
  .hero p{color:var(--muted);font-weight:500;margin:8px 0 0}
  .rolegrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:620px;margin:18px auto 0}
  @media(max-width:560px){.rolegrid{grid-template-columns:1fr}}
  .role{background:#fff;border:1.5px solid var(--line);border-radius:18px;padding:26px 18px;text-align:center;
    cursor:pointer;transition:.15s;box-shadow:0 10px 30px -24px rgba(42,59,143,.5)}
  .role:hover{transform:translateY(-3px);border-color:var(--indigo-soft)}
  .role .ico{font-size:44px}
  .role .nm{font-family:"Baloo 2";font-weight:700;font-size:19px;color:var(--indigo);margin:8px 0 4px}
  .role .ds{font-size:12.5px;color:var(--muted)}
  .lvbadges{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
  .lvbadges span{font-size:11.5px;font-weight:700;color:#fff;border-radius:999px;padding:5px 13px}
  /* Giấy chứng nhận */
  .cert{background:linear-gradient(135deg,#fff,#F3F7FF);border:6px double var(--gold);border-radius:14px;
    padding:34px 30px;text-align:center;max-width:640px;margin:0 auto}
  .cert .seal{font-size:46px}
  .cert h2{font-family:"Baloo 2";color:var(--gold);font-size:30px;margin:6px 0}
  .cert .nm{font-family:"Baloo 2";font-size:30px;color:var(--indigo);margin:14px 0}
  .cert .dsc{font-size:15px;color:var(--ink);line-height:1.7}
  @media print{ body *{visibility:hidden} #printArea,#printArea *{visibility:visible}
    #printArea{position:absolute;left:0;top:0;width:100%} .noprint{display:none!important} }
  .link{color:var(--indigo);font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script type="module">
/* ============================================================
   CẤU HÌNH — DÁN firebaseConfig CỦA BẠN VÀO ĐÂY
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBrLzdtAUUnS-jpAjqAzWQKe7KA1JIoJog",
  authDomain: "san-choi-toan.firebaseapp.com",
  projectId: "san-choi-toan",
  storageBucket: "san-choi-toan.firebasestorage.app",
  messagingSenderId: "665539536376",
  appId: "1:665539536376:web:1bd7f981692527b8f7e20d"
};
// URL gốc tới các game (thư mục game nằm cùng repo). Nếu app đặt ở toan-games/luyen-tap/ thì để "../"
const GAME_BASE = "../";
const GAMES = [
  {folder:"xac-suat",  name:"Phòng Lab Xác Suất", lop:10, topic:"Xác suất cổ điển",      ready:true, auto:true},
  {folder:"parabol",   name:"Pháo Thủ Parabol",   lop:10, topic:"Hàm số bậc hai",        ready:true, auto:true},
  {folder:"nong-trai", name:"Nông Trại Tối Ưu",   lop:10, topic:"Bất PT bậc nhất hai ẩn", ready:true, auto:true},
  {folder:"vecto",     name:"Phi Thuyền Vectơ",  lop:10, topic:"Vectơ · tích vô hướng", ready:true, auto:true},
  {folder:"duong-tron",name:"Trạm Vệ Tinh",      lop:10, topic:"Đường tròn · elip",      ready:true, auto:true},
  {folder:"pha-ket",   name:"Phá Két Mật Mã",     lop:10, topic:"Tổ hợp · hoán vị",       ready:true, auto:true},
  {folder:"dau-tu",    name:"Đầu Tư Thông Minh",  lop:11, topic:"Cấp số nhân · lãi kép",  ready:true, auto:true},
  {folder:"thiet-ke",  name:"Nhà Thiết Kế",       lop:12, topic:"Đạo hàm · bài toán tối ưu", ready:true, auto:true},
  {folder:"kho-van",   name:"Kho Vận 3D",         lop:12, topic:"Hình không gian · Oxyz", ready:true, auto:true},
];
const DEFAULT_CERT = 80; // % điểm tối thiểu để được cấp giấy chứng nhận

/* ============================================================ */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc,
  deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let db=null, fbError=null;
try { const fbApp=initializeApp(firebaseConfig); db=getFirestore(fbApp); }
catch(e){ fbError=e.message; }
const configured = !firebaseConfig.apiKey.startsWith("DÁN");

const app=document.getElementById('app');
const T=document.getElementById('toast');
function renderKatex(el){ if(!el||!window.renderMathInElement) return;
  try{ renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false}); }catch(e){}
}
function toast(m){ T.textContent=m; T.classList.add('show'); setTimeout(()=>T.classList.remove('show'),2200); }
function esc(s){ return (s||'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function rid(n=6){ const s="ABCDEFGHJKMNPQRSTUVWXYZ23456789"; let r=""; for(let i=0;i<n;i++)r+=s[Math.floor(Math.random()*s.length)]; return r; }
const fmtMin=sec=>sec==null?'-':(sec<60? sec+'″' : Math.round(sec/60)+'′');

// Firestore helpers
const cls = id => doc(db,"classes",id);
const studs = id => collection(db,"classes",id,"students");
const asgs = id => collection(db,"classes",id,"assignments");
const subs = id => collection(db,"classes",id,"submissions");
const msgs = id => collection(db,"classes",id,"messages");

let S={view:"home", classId:null, cls:null, student:null};

/* ===== Nhận kết quả từ game (postMessage) — ĐỊNH DẠNG PAYLOAD MỚI =====
   Game gửi: { source:'SCT_GAME', type:'RESULT', game:'<folder>',
               percent, stars, starsMax, timeSec, quizCorrect, quizAsked, detail }
   Bảo mật: chỉ nhận từ CÙNG ORIGIN (game và app cùng tên miền);
   khi chạy file:// (dạy ngoại tuyến) origin là 'null' nên bỏ qua kiểm tra. */
let pendingGame=null, lastResultAt=0;
async function recordGameResult(g, d){
  const percent=Math.max(0,Math.min(100,Math.round(d.percent||0)));
  await addDoc(subs(S.classId),{studentKey:S.student.key,studentName:S.student.name,aid:g.aid,aTitle:g.title,
    kind:"game",percent,
    stars:(d.stars!=null?d.stars:null), starsMax:(d.starsMax!=null?d.starsMax:null),
    timeSec:(d.timeSec!=null?Math.round(d.timeSec):null),
    quizCorrect:(d.quizCorrect!=null?d.quizCorrect:null), quizAsked:(d.quizAsked!=null?d.quizAsked:null),
    detail:d.detail||'', at:Date.now()});
  if(S.view==='sdash') viewStudentDash();
}
window.addEventListener('message',ev=>{
  const d=ev.data;
  if(!d||d.source!=='SCT_GAME'||d.type!=='RESULT'||!S.student||!pendingGame) return;
  if(location.protocol.startsWith('http') && ev.origin!==location.origin) return;      // chặn origin lạ
  if(d.game && pendingGame.folder && d.game!==pendingGame.folder) return;               // đúng game đang giao
  if(Date.now()-lastResultAt<1500) return;                                              // chặn gửi dồn dập
  lastResultAt=Date.now();
  const g={aid:pendingGame.aid,title:pendingGame.title};
  recordGameResult(g,d).then(()=>toast(`Đã nhận: ${Math.round(d.percent||0)}%${d.stars!=null?` · ⭐${d.stars}/${d.starsMax}`:''} 🎮`));
});

/* ===================== ĐIỀU HƯỚNG ===================== */
function render(){
  if(!configured){ app.innerHTML=`<div class="card"><h1>Sân Chơi Toán Học<span class="dot">.</span></h1>
    <div class="banner" style="margin-top:14px">⚙️ Web app chưa được cấu hình Firebase. Hãy mở mã nguồn, dán <b>firebaseConfig</b> của bạn vào đầu file, rồi tải lại trang.</div></div>`; return; }
  if(fbError){ app.innerHTML=`<div class="card"><h2>Lỗi kết nối</h2><p class="muted">${esc(fbError)}</p></div>`; return; }
  const v=S.view;
  if(v==="home") return viewHome();
  if(v==="tlogin") return viewTeacherLogin();
  if(v==="tdash") return viewTeacherDash();
  if(v==="slogin") return viewStudentLogin();
  if(v==="sdash") return viewStudentDash();
  if(v==="quiz") return viewQuiz();
  if(v==="cert") return viewCert();
}
function go(v){ S.view=v; render(); }

/* ===================== TRANG CHỦ ===================== */
function viewHome(){
  app.innerHTML=`
    <div class="hero">
      <h1>Sân Chơi Toán Học<span class="dot">.</span></h1>
      <p>Hệ sinh thái luyện tập: ${GAMES.length} trò chơi tương tác · phiếu bài tập tự chấm · thống kê cho thầy cô</p>
      <div class="lvbadges">
        <span style="background:var(--indigo)">LỚP 10 · ${GAMES.filter(g=>g.lop===10).length} game trọng tâm</span>
        <span style="background:var(--teal)">LỚP 11 · mở rộng</span>
        <span style="background:var(--violet)">LỚP 12 · mở rộng</span>
      </div>
    </div>
    <div class="rolegrid">
      <div class="role" id="bS"><div class="ico">🎒</div><div class="nm">Học sinh</div>
        <div class="ds">Vào bằng mã lớp + key riêng.<br>Chơi game, làm phiếu, nhận giấy chứng nhận.</div></div>
      <div class="role" id="bT"><div class="ico">👩‍🏫</div><div class="nm">Giáo viên</div>
        <div class="ds">Tạo lớp, giao bài, theo dõi tiến độ.<br>Thống kê phổ điểm, câu hỏi khó, xuất CSV.</div></div>
    </div>`;
  app.querySelector('#bS').onclick=()=>go('slogin');
  app.querySelector('#bT').onclick=()=>go('tlogin');
}

/* ===================== GIÁO VIÊN: ĐĂNG NHẬP/TẠO LỚP ===================== */
function viewTeacherLogin(){
  const saved=JSON.parse(localStorage.getItem('sct_tclass')||'null');
  app.innerHTML=`
    <div class="topbar"><h1>Giáo viên<span class="dot">.</span></h1><button class="sec" id="back">← Trang chủ</button></div>
    <div class="card">
      <h2>Đăng nhập / Tạo lớp</h2>
      <label>Mã lớp (tự đặt, vd: 12A1-2026)</label><input id="cid" placeholder="Mã lớp" value="${esc(saved||'')}">
      <label>Mã PIN giáo viên</label><input id="pin" type="password" placeholder="PIN bí mật">
      <div class="row" style="margin-top:14px">
        <button class="pri" id="enter">Vào lớp</button>
        <button class="sec" id="create">Tạo lớp mới</button>
      </div>
      <p class="muted" style="margin-top:10px">Mã lớp + PIN dùng để quản lý. Học sinh chỉ cần mã lớp và key riêng.</p>
    </div>`;
  app.querySelector('#back').onclick=()=>go('home');
  app.querySelector('#enter').onclick=async()=>{
    const id=app.querySelector('#cid').value.trim(), pin=app.querySelector('#pin').value.trim();
    if(!id||!pin) return toast("Nhập mã lớp và PIN");
    const snap=await getDoc(cls(id));
    if(!snap.exists()) return toast("Lớp chưa tồn tại — bấm Tạo lớp mới");
    if(snap.data().teacherPin!==pin) return toast("Sai PIN");
    localStorage.setItem('sct_tclass',JSON.stringify(id));
    S.classId=id; S.cls=snap.data(); go('tdash');
  };
  app.querySelector('#create').onclick=async()=>{
    const id=app.querySelector('#cid').value.trim(), pin=app.querySelector('#pin').value.trim();
    if(!id||!pin) return toast("Nhập mã lớp và PIN");
    const snap=await getDoc(cls(id));
    if(snap.exists()) return toast("Mã lớp đã tồn tại, hãy chọn mã khác");
    const data={name:id,teacherPin:pin,certThreshold:DEFAULT_CERT,createdAt:Date.now()};
    await setDoc(cls(id),data); localStorage.setItem('sct_tclass',JSON.stringify(id));
    S.classId=id; S.cls=data; toast("Đã tạo lớp"); go('tdash');
  };
}

/* ===================== GIÁO VIÊN: BẢNG ĐIỀU KHIỂN ===================== */
let tTab="students";
function viewTeacherDash(){
  app.innerHTML=`
    <div class="topbar"><div><h1>Lớp ${esc(S.classId)}<span class="dot">.</span></h1><span class="who">Giáo viên</span></div>
      <button class="sec" id="out">Đăng xuất</button></div>
    <div class="tabs">
      <button data-t="students">👥 Học sinh</button>
      <button data-t="assign">📝 Bài tập & Game</button>
      <button data-t="results">📊 Kết quả & Báo cáo</button>
      <button data-t="msg">✉️ Tin nhắn</button>
      <button data-t="settings">⚙️ Lớp</button>
    </div>
    <div id="tbody"></div>`;
  app.querySelector('#out').onclick=()=>{S.classId=null;S.cls=null;go('home');};
  app.querySelectorAll('.tabs button').forEach(b=>{b.classList.toggle('on',b.dataset.t===tTab);
    b.onclick=()=>{tTab=b.dataset.t;viewTeacherDash();};});
  if(tTab==="students") tStudents();
  if(tTab==="assign") tAssign();
  if(tTab==="results") tResults();
  if(tTab==="msg") tMsg();
  if(tTab==="settings") tSettings();
}

  body.innerHTML=`<div class="card"><h2>Nhập danh sách lớp</h2>

      <div id="list"></div></div>`;
  body.querySelector('#imp').onclick=async()=>{
    const lines=body.querySelector('#names').value.split('\n').map(s=>s.trim()).filter(Boolean);

    for(const nm of lines){ const key=rid(); await setDoc(doc(studs(S.classId),key),{name:nm,key}); }

  };
  async function loadList(){
    const [ss,sb]=await Promise.all([getDocs(studs(S.classId)),getDocs(subs(S.classId))]);
    const arr=ss.docs.map(d=>d.data()).sort((a,b)=>a.name.localeCompare(b.name,'vi'));
    const subsArr=sb.docs.map(d=>d.data());
    const doneCount=k=>new Set(subsArr.filter(s=>s.studentKey===k).map(s=>s.aid)).size;
    body.querySelector('#cnt').textContent=arr.length;
    body.querySelector('#list').innerHTML = arr.length? `<table><tr><th>Họ tên</th><th>Key</th><th>Đã làm (bài)</th><th></th></tr>`+
      arr.map(s=>`<tr><td>${esc(s.name)}</td><td><b>${s.key}</b></td><td>${doneCount(s.key)}</td>
        <td><button class="danger" data-k="${s.key}" style="padding:4px 10px;font-size:12px">Xoá</button></td></tr>`).join('')+`</table>`
      : `<p class="muted">Chưa có học sinh.</p>`;
    body.querySelectorAll('[data-k]').forEach(b=>b.onclick=async()=>{ await deleteDoc(doc(studs(S.classId),b.dataset.k)); loadList(); });
    body.querySelector('#exp').onclick=()=>{
      const csv="Ho ten,Key\n"+arr.map(s=>`"${s.name}",${s.key}`).join('\n');
      dl(csv,"danh_sach_key_"+S.classId+".csv");
    };
    body.querySelector('#prn').onclick=()=>{ // phiếu key cắt phát cho từng em
      const w=window.open('','_blank');
      w.document.write(`<html><head><title>Phiếu key ${esc(S.classId)}</title><style>
        body{font-family:sans-serif} .k{display:inline-block;border:1px dashed #888;border-radius:8px;
        padding:10px 14px;margin:6px;width:240px}.k b{font-size:18px}</style></head><body>
        <h3>Lớp ${esc(S.classId)} — phiếu đăng nhập Sân Chơi Toán Học</h3>`+
        arr.map(s=>`<div class="k">${esc(s.name)}<br>Mã lớp: <b>${esc(S.classId)}</b> · Key: <b>${s.key}</b></div>`).join('')+
        `<script>print()<\/script></body></html>`);
      w.document.close();
    };
  }
  loadList();
}

/* ========== GIÁO VIÊN: KẾT QUẢ & BÁO CÁO (nâng cấp toàn diện) ========== */
let rFilter="all";
async function tResults(){
  const body=app.querySelector('#tbody');
  const [ss,sb,aa]=await Promise.all([getDocs(studs(S.classId)),getDocs(subs(S.classId)),getDocs(asgs(S.classId))]);
  const students=ss.docs.map(d=>d.data());
  const allSubs=sb.docs.map(d=>d.data());
  const asn=aa.docs.map(d=>({id:d.id,...d.data()}));
  const th=S.cls.certThreshold||DEFAULT_CERT;

  body.innerHTML=`
    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center">
        <h2>Tổng quan lớp</h2>
        <select id="fA" style="width:auto;max-width:280px">${
          ['<option value="all">— Tất cả bài đã giao —</option>',
           ...asn.map(a=>`<option value="${a.id}" ${rFilter===a.id?'selected':''}>${a.kind==='game'?'🎮':'📝'} ${esc(a.title)}</option>`)].join('')}</select>
      </div>
      <div id="stats"></div>
      <div id="histo" style="margin-top:14px"></div>
    </div>
    <div class="card" id="byAsgCard"><h2>Theo từng bài <small>ai đã làm — ai chưa</small></h2><div id="byAsg"></div></div>
    <div class="card" id="hardCard" style="display:none"><h2>Phân tích câu hỏi <small>câu nào lớp sai nhiều?</small></h2><div id="hardQ"></div></div>
    <div class="card"><h2>Học sinh cần hỗ trợ <small>chưa làm bài hoặc điểm trung bình &lt; 50%</small></h2><div id="needHelp"></div></div>
    <div class="card"><div class="row" style="justify-content:space-between"><h2>Bài làm chi tiết</h2>
      <button class="sec" id="exp">⬇ Xuất CSV</button></div><div id="detail"></div></div>`;

  body.querySelector('#fA').onchange=e=>{rFilter=e.target.value;tResults();};

  const filtered = rFilter==='all' ? allSubs : allSubs.filter(s=>s.aid===rFilter);

  // ---- Thẻ tổng quan ----
  const quizSubs=filtered.filter(x=>x.kind==='quiz'), gameSubs=filtered.filter(x=>x.kind==='game');
  const did=new Set(filtered.map(s=>s.studentKey)).size;
  const avgQ=quizSubs.length?Math.round(quizSubs.reduce((s,x)=>s+(x.percent||0),0)/quizSubs.length):null;
  const avgG=gameSubs.length?Math.round(gameSubs.reduce((s,x)=>s+(x.percent||0),0)/gameSubs.length):null;
  const totalStars=gameSubs.reduce((s,x)=>s+(x.stars||0),0);
  body.querySelector('#stats').innerHTML=`<div class="grid">
    <div class="stat c1"><div class="n">${students.length}</div><div class="l">Học sinh</div></div>
    <div class="stat c3"><div class="n">${did}</div><div class="l">Đã tham gia</div></div>
    <div class="stat c1"><div class="n">${filtered.length}</div><div class="l">Lượt nộp</div></div>
    <div class="stat c2"><div class="n">${avgQ!=null?avgQ+'%':'—'}</div><div class="l">TB phiếu</div></div>
    <div class="stat c2"><div class="n">${avgG!=null?avgG+'%':'—'}</div><div class="l">TB game</div></div>
    <div class="stat c4"><div class="n">${totalStars}⭐</div><div class="l">Tổng sao game</div></div></div>`;

  // ---- Phổ điểm (kết quả TỐT NHẤT của mỗi HS cho mỗi bài) ----
  const bestMap={};   // `${key}|${aid}` -> best percent
  filtered.forEach(s=>{ const k=s.studentKey+'|'+s.aid;
    if(bestMap[k]==null||(s.percent||0)>bestMap[k]) bestMap[k]=s.percent||0; });
  const bests=Object.values(bestMap);
  if(bests.length){
    const buckets=[['0–49%',0,49,'r'],['50–64%',50,64,'o'],['65–79%',65,79,'y'],['80–100%',80,100,'e']];
    const mx=Math.max(...buckets.map(b=>bests.filter(p=>p>=b[1]&&p<=b[2]).length),1);
    body.querySelector('#histo').innerHTML=`<b style="font-size:13px">Phổ điểm (kết quả tốt nhất của mỗi em · ${bests.length} lượt tính):</b>`+
      buckets.map(b=>{ const n=bests.filter(p=>p>=b[1]&&p<=b[2]).length;
        return `<div class="hbar"><span class="lab">${b[0]}</span><span class="track">
          <span class="fill ${b[3]}" style="width:${Math.round(n/mx*100)}%">${n||''}</span></span></div>`; }).join('');
  } else body.querySelector('#histo').innerHTML=`<p class="muted">Chưa có dữ liệu.</p>`;

  // ---- Theo từng bài: đã làm / chưa làm / TB / đạt mục tiêu ----
  const listAsn = rFilter==='all'? asn : asn.filter(a=>a.id===rFilter);
  body.querySelector('#byAsg').innerHTML = listAsn.length? `<table>
    <tr><th>Bài</th><th>Đã làm</th><th>TB tốt nhất</th><th>Đạt ${'≥'}${th}%</th><th>Chưa làm</th></tr>`+
    listAsn.sort((a,b)=>b.createdAt-a.createdAt).map(a=>{
      const doneKeys=[...new Set(allSubs.filter(s=>s.aid===a.id).map(s=>s.studentKey))];
      const bestOf=k=>Math.max(...allSubs.filter(s=>s.aid===a.id&&s.studentKey===k).map(s=>s.percent||0));
      const bestsA=doneKeys.map(bestOf);
      const avg=bestsA.length?Math.round(bestsA.reduce((x,y)=>x+y,0)/bestsA.length):null;
      const pass=bestsA.filter(p=>p>=th).length;
      const notDone=students.filter(st=>!doneKeys.includes(st.key)).map(st=>st.name);
      return `<tr><td>${a.kind==='game'?'🎮':'📝'} ${esc(a.title)}</td>
        <td>${doneKeys.length}/${students.length}</td><td>${avg!=null?avg+'%':'—'}</td><td>${pass}</td>
        <td style="font-size:12px;color:${notDone.length?'var(--red)':'var(--emerald-d)'}">${
          notDone.length? esc(notDone.slice(0,4).join(', '))+(notDone.length>4?` +${notDone.length-4} em`:'') : '✓ đủ cả lớp'}</td></tr>`;
    }).join('')+`</table>` : `<p class="muted">Chưa giao bài nào.</p>`;

  // ---- Phân tích câu hỏi khó (khi lọc đúng 1 phiếu) ----
  const selA=asn.find(a=>a.id===rFilter);
  if(selA&&selA.kind==='quiz'){
    const withD=allSubs.filter(s=>s.aid===selA.id&&Array.isArray(s.qDetail));
    body.querySelector('#hardCard').style.display='';
    if(withD.length){
      const n=selA.questions.length;
      const rates=Array.from({length:n},(_,i)=>{
        const pts=withD.map(s=>s.qDetail[i]||0);
        return Math.round(pts.reduce((a,b)=>a+b,0)/pts.length*100);
      });
      body.querySelector('#hardQ').innerHTML=
        `<p class="muted">Tỉ lệ đạt điểm từng câu (trên ${withD.length} bài nộp) — cột càng ngắn càng cần chữa kỹ:</p>`+
        rates.map((r,i)=>`<div class="hbar"><span class="lab">Câu ${i+1} (${selA.questions[i].type})</span>
          <span class="track"><span class="fill ${r>=80?'e':r>=50?'y':'r'}" style="width:${Math.max(r,6)}%">${r}%</span></span></div>`).join('');
    } else body.querySelector('#hardQ').innerHTML=`<p class="muted">Chưa có bài nộp có dữ liệu từng câu (bài nộp từ phiên bản cũ không có).</p>`;
  }

  // ---- Học sinh cần hỗ trợ ----
  const perStu={};
  allSubs.forEach(s=>{ const o=(perStu[s.studentKey]=perStu[s.studentKey]||{best:{}});
    if(o.best[s.aid]==null||(s.percent||0)>o.best[s.aid]) o.best[s.aid]=s.percent||0; });
  const help=[];
  students.forEach(st=>{
    const o=perStu[st.key];
    if(!o){ help.push({name:st.name,why:'chưa làm bài nào'}); return; }
    const vals=Object.values(o.best); const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
    if(avg<50) help.push({name:st.name,why:'TB '+avg+'%'});
  });
  body.querySelector('#needHelp').innerHTML = help.length
    ? `<div class="chips">${help.map(h=>`<span class="pill r">${esc(h.name)} · ${h.why}</span>`).join('')}</div>`
    : `<p class="muted" style="color:var(--emerald-d)">✓ Cả lớp đều đã tham gia và đạt TB ≥ 50%.</p>`;

  // ---- Bảng chi tiết ----
  let html=`<table><tr><th></th><th>Học sinh</th><th>Bài</th><th>Điểm</th><th>%</th><th>⭐</th><th>Củng cố</th><th>Thời gian</th><th>Cảnh báo</th><th>Khi nào</th></tr>`;
  filtered.sort((a,b)=>(b.at||0)-(a.at||0)).forEach(s=>{
    const diem = s.kind==='game' ? '🎮' : (s.score+'/'+s.maxScore);
    const sao = s.stars!=null ? `<span class="stars-gold">${s.stars}${s.starsMax?'/'+s.starsMax:''}</span>` : '-';
    const cc = s.quizAsked!=null&&s.quizAsked>0 ? `${s.quizCorrect||0}/${s.quizAsked}` : '-';
    const tsec = s.kind==='game' ? s.timeSec : s.timeSpent;
    html+=`<tr><td>${s.kind==='game'?'🎮':'📝'}</td><td>${esc(s.studentName)}</td><td>${esc(s.aTitle)}</td>
      <td>${diem}</td><td>${s.percent!=null?s.percent+'%':'-'}</td><td>${sao}</td><td>${cc}</td>
      <td>${fmtMin(tsec)}</td><td>${s.violations?('⚠️'+s.violations):'-'}</td>
      <td style="font-size:11.5px">${s.at?new Date(s.at).toLocaleString('vi-VN'):''}</td></tr>`;
  });
  html+=`</table>`;
  body.querySelector('#detail').innerHTML = filtered.length? html : `<p class="muted">Chưa có bài nộp.</p>`;
  body.querySelector('#exp').onclick=()=>{
    const csv="Hoc sinh,Key,Bai,Loai,Diem,PhanTram,Sao,SaoMax,CungCoDung,CungCoTong,ThoiGian(s),CanhBao,DatNguong,ThoiDiem\n"+
      filtered.map(s=>`"${s.studentName}",${s.studentKey},"${s.aTitle}",${s.kind},${s.kind==='game'?'':(s.score+'/'+s.maxScore)},${s.percent??''},${s.stars??''},${s.starsMax??''},${s.quizCorrect??''},${s.quizAsked??''},${(s.kind==='game'?s.timeSec:s.timeSpent)??''},${s.violations||0},${(s.percent||0)>=th?'Co':''},"${s.at?new Date(s.at).toLocaleString('vi-VN'):''}"`).join('\n');
    dl(csv,"ket_qua_"+S.classId+".csv");
  };
}

let quizState=null;
function viewQuiz(){
  const a=S.quiz; quizState={answers:a.questions.map(()=>null), violations:0, start:Date.now(), timer:null, left:a.duration*60};
  app.innerHTML=`<div class="topbar"><h2>${esc(a.title)}</h2>

    <div id="qs"></div>
    <button class="ok" id="submit" style="width:100%;margin-top:6px">Nộp bài</button>`;
  const qc=app.querySelector('#qs');
  a.questions.forEach((q,i)=>{
    const d=document.createElement('div'); d.className='qbox';
    if(q.type==='TN'){
      d.innerHTML=`<div class="qt">Câu ${i+1}. ${esc(q.q)}</div>`+
        q.opts.map((o,j)=>`<label class="opt" data-i="${i}" data-j="${j}"><b>${'ABCD'[j]}.</b> ${esc(o.t)}</label>`).join('');
    } else if(q.type==='DS'){
      d.innerHTML=`<div class="qt">Câu ${i+1}. ${esc(q.q)}</div>`+
        q.sts.map((s,j)=>`<div class="dsrow"><span>${'abcd'[j]}) ${esc(s.t)}</span>
          <span class="b"><button data-i="${i}" data-j="${j}" data-v="1">Đúng</button>
          <button data-i="${i}" data-j="${j}" data-v="0">Sai</button></span></div>`).join('');
      quizState.answers[i]=q.sts.map(()=>null);
    } else {
      d.innerHTML=`<div class="qt">Câu ${i+1}. ${esc(q.q)}</div><input data-tln="${i}" placeholder="Nhập đáp án (số)">`;
    }
    qc.appendChild(d);
  });
  renderKatex(qc);
  qc.querySelectorAll('.opt').forEach(o=>o.onclick=()=>{
    const i=+o.dataset.i; qc.querySelectorAll(`.opt[data-i="${i}"]`).forEach(x=>x.classList.remove('sel'));
    o.classList.add('sel'); quizState.answers[i]=+o.dataset.j;
  });
  qc.querySelectorAll('.dsrow .b button').forEach(btn=>btn.onclick=()=>{
    const i=+btn.dataset.i,j=+btn.dataset.j,v=+btn.dataset.v;
    quizState.answers[i][j]=v; const sib=btn.parentElement.querySelectorAll('button');
    sib.forEach(x=>x.className=''); btn.className=v?'t':'f';
  });
  qc.querySelectorAll('[data-tln]').forEach(inp=>inp.oninput=()=>{ quizState.answers[+inp.dataset.tln]=inp.value; });
  app.querySelector('#submit').onclick=submitQuiz;
  document.addEventListener('visibilitychange',vioH);
  window.addEventListener('blur',vioH);
  if(a.duration){ quizState.timer=setInterval(()=>{ quizState.left--; const tm=app.querySelector('#tm');
    if(tm){tm.textContent=fmtT(quizState.left); tm.classList.toggle('warn',quizState.left<60);}
    if(quizState.left<=0) submitQuiz(); },1000); }
}
function vioH(){ if(document.hidden||document.visibilityState==='hidden'){ if(quizState){quizState.violations++;
  const v=app.querySelector('#vio'); if(v)v.textContent=quizState.violations; toast("⚠️ Đã rời khỏi bài làm!");}} }
function cleanupQuiz(){ document.removeEventListener('visibilitychange',vioH); window.removeEventListener('blur',vioH);
  if(quizState&&quizState.timer) clearInterval(quizState.timer); }

async function submitQuiz(){
  const a=S.quiz; let score=0; const qDetail=[];
  a.questions.forEach((q,i)=>{
    let pt=0; const ans=quizState.answers[i];
    if(q.type==='TN'){ pt = (ans!=null && q.opts[ans] && q.opts[ans].correct)?1:0; }
    else if(q.type==='DS'){ const arr=ans||[]; let c=0; q.sts.forEach((s,j)=>{ if((arr[j]===1)===s.correct) c++; });
      if(q.sts.length===4) pt=[0,0.1,0.25,0.5,1][c]; else pt=c/q.sts.length; }
    else { const u=normNum(ans), k=normNum(q.ans); pt=(u!=null&&k!=null&&Math.abs(u-k)<1e-6)?1:0; }
    score+=pt; qDetail.push(Math.round(pt*100)/100);
  });
  const max=a.questions.length, percent=Math.round(score/max*100), time=Math.round((Date.now()-quizState.start)/1000);
  cleanupQuiz();
  const late = !!(a.deadline && Date.now() > new Date(a.deadline+'T23:59:59').getTime());
  await addDoc(subs(S.classId),{studentKey:S.student.key,studentName:S.student.name,aid:a.id,aTitle:a.title,
    kind:"quiz",score:Math.round(score*100)/100,maxScore:max,percent,timeSpent:time,
    violations:quizState.violations,late,qDetail,at:Date.now()});
  const th=S.cls.certThreshold||DEFAULT_CERT;
  // xem lại từng câu (chỉ báo đúng/sai — không lộ đáp án để có thể làm lại)
  const review=qDetail.map((p,i)=>`<span class="pill ${p>=1?'g':p>0?'y':'r'}">C${i+1}: ${p>=1?'✓':p>0?'nửa':'✗'}</span>`).join(' ');
  app.innerHTML=`<div class="card center"><div class="big">${percent}%</div>
    <p>Đúng ${Math.round(score*100)/100}/${max} điểm · thời gian ${Math.round(time/60)}′${quizState.violations?` · ⚠️ ${quizState.violations} lần rời màn`:''}</p>
    <div class="chips" style="justify-content:center">${review}</div>
    ${percent>=th?`<p style="color:var(--emerald-d);font-weight:600;margin-top:10px">🎉 Xuất sắc! Em đủ điều kiện nhận giấy chứng nhận.</p>`:`<p class="muted" style="margin-top:10px">Cố thêm để đạt ≥ ${th}% nhận giấy chứng nhận nhé!</p>`}
    <div class="row" style="justify-content:center;margin-top:10px">
      ${percent>=th?`<button class="ok" id="cert">🏅 Nhận giấy chứng nhận</button>`:''}
      <button class="sec" id="bk">Về trang học</button></div></div>`;
  if(percent>=th) app.querySelector('#cert').onclick=()=>{ S.cert={title:a.title,percent}; go('cert'); };
  app.querySelector('#bk').onclick=()=>go('sdash');
}

/* ===================== TIỆN ÍCH ===================== */
function parseQuiz(text){
  const blocks=text.split(/\n\s*\n/).map(b=>b.trim()).filter(Boolean); const qs=[];
  for(const b of blocks){
    const lines=b.split('\n').map(l=>l.trim()).filter(Boolean);
    const m=lines[0].match(/^\[(TN|DS|TLN)\]\s*(.*)$/i); if(!m) continue;
    const type=m[1].toUpperCase();
    if(type==='TLN'){ const full=lines.join(' ').replace(/^\[TLN\]\s*/i,'').split('|');
      qs.push({type,q:full[0].trim(),ans:(full[1]||'').trim()}); }
    else if(type==='TN'){ qs.push({type,q:m[2],opts:lines.slice(1).map(l=>({
      correct:l.startsWith('*'), t:l.replace(/^\*/,'').replace(/^[A-Da-d][\.\)]\s*/,'').trim()}))}); }
    else { qs.push({type,q:m[2],sts:lines.slice(1).map(l=>({
      correct:l.startsWith('*'), t:l.replace(/^\*/,'').replace(/^[a-d][\.\)]\s*/,'').trim()}))}); }
  }
  return qs;
}
function normNum(s){ if(s==null) return null; const v=parseFloat(String(s).replace(',','.').replace(/[^\d.\-]/g,'')); return isNaN(v)?null:v; }
function fmtT(s){ s=Math.max(0,s); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
function dl(content,name){ const b=new Blob(["\uFEFF"+content],{type:'text/csv;charset=utf-8'});
  const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }

render();
