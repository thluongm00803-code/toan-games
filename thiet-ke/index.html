<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhà Thiết Kế — Toán 12</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBFAF4; --ink:#1C2438; --indigo:#2A3B8F; --indigo-soft:#6B7BD6;
    --tangerine:#FF7A1A; --tang-d:#C95C09; --emerald:#1FA36B; --emerald-d:#15784E;
    --red:#C0392B; --gold:#E8A317; --line:#E4E0D4; --muted:#6A7184;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Be Vietnam Pro",system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(120% 80% at 72% -10%, #EAF2FF 0%, transparent 55%),var(--paper);
    min-height:100vh;padding:18px 14px 40px}
  .wrap{max-width:960px;margin:0 auto}
  header{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  h1{font-family:"Baloo 2",sans-serif;font-weight:700;font-size:clamp(26px,5vw,40px);
    margin:0;letter-spacing:-.5px;color:var(--indigo)}
  h1 .dot{color:var(--tangerine)}
  .sub{color:var(--muted);font-size:14px;font-weight:500}
  .mission{background:linear-gradient(180deg,#fff,#F1F3FA);border:1px solid #D8DEF0;
    border-radius:14px;padding:12px 16px;margin:14px 0;display:flex;align-items:center;gap:12px}
  .mission .ctx{font-size:26px}.mission .txt{font-size:15px}.mission .txt b{color:var(--indigo)}
  .mission .txt .expert{color:#B0328A;font-weight:600}
  .stage{position:relative;background:#fff;border:1px solid var(--line);border-radius:16px;
    overflow:hidden;box-shadow:0 10px 30px -18px rgba(42,59,143,.4)}
  canvas#cv{display:block;width:100%;height:auto}
  .hud{position:absolute;top:10px;left:10px;display:flex;gap:8px;flex-wrap:wrap;
    font-family:"Baloo 2",sans-serif;font-weight:600;font-size:13px;z-index:10}
  .chip{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:999px;
    padding:4px 12px;color:var(--indigo)}.chip b{color:var(--tangerine)}
  button.chip{cursor:pointer;flex:none;font-size:13px;box-shadow:none;
    font-family:"Baloo 2",sans-serif;font-weight:600}
  .panel{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
  @media(max-width:640px){.panel{grid-template-columns:1fr}}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}
  .card h3{margin:0 0 12px;font-family:"Baloo 2",sans-serif;font-weight:600;font-size:15px;
    color:var(--indigo);display:flex;align-items:center;gap:7px}
  canvas#obj{display:block;width:100%;height:140px;background:#F7F9FD;border-radius:10px;margin-bottom:12px}
  .ctrl label{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:7px}
  .ctrl label .val{font-family:"JetBrains Mono",monospace;color:var(--tang-d)}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:999px;
    background:linear-gradient(90deg,var(--indigo-soft),var(--indigo));outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;
    background:#fff;border:4px solid var(--tangerine);cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.2)}
  input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;border:4px solid var(--tangerine);cursor:pointer}
  .reads{display:flex;gap:8px;margin:12px 0}
  .rd{flex:1;background:#F4F6FB;border-radius:10px;padding:9px;text-align:center}
  .rd .lab{font-size:11px;color:var(--muted);font-weight:600}
  .rd .num{font-family:"Baloo 2",sans-serif;font-size:17px;color:var(--ink)}
  .slope{border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;margin-bottom:12px;text-align:center}
  .slope.pos{background:#FDF0E8;color:var(--tang-d)} .slope.neg{background:#EEF1FB;color:var(--indigo)}
  .slope.zero{background:#E8F7EE;color:var(--emerald-d)}
  .slope .mono{font-family:"JetBrains Mono",monospace}
  .actions{display:flex;gap:8px}
  button.act{font-family:"Baloo 2",sans-serif;font-weight:600;font-size:15px;border:none;
    border-radius:12px;padding:12px 14px;cursor:pointer;transition:transform .08s}
  button.act:active{transform:translateY(2px)}
  .lock{flex:1;background:var(--tangerine);color:#fff;box-shadow:0 5px 0 var(--tang-d)}
  .lock:active{box-shadow:0 3px 0 var(--tang-d)}
  .reset{background:#EEF0F7;color:var(--indigo)}
  .formula{background:#0F1530;color:#E8ECFF;border-radius:12px;padding:14px 16px;font-family:"Baloo 2",sans-serif}
  .formula .row{font-size:15px;line-height:2}
  .formula .row .mono{font-family:"JetBrains Mono",monospace;color:#FFD27A}
  .formula .row b{color:#86F0C0}
  .tip{font-size:12.5px;color:var(--muted);margin-top:12px;line-height:1.55}.tip b{color:var(--indigo)}
  .toast{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(15,21,48,.55);backdrop-filter:blur(2px);z-index:20}
  .toast.show{display:flex}
  .toast .box{background:#fff;border-radius:18px;padding:24px 26px;text-align:center;max-width:360px;
    width:calc(100% - 40px);box-shadow:0 20px 50px -20px rgba(0,0,0,.5)}
  .toast .stars{font-size:30px;letter-spacing:4px}
  .toast h2{font-family:"Baloo 2",sans-serif;margin:8px 0 4px;font-size:23px;color:var(--emerald-d)}
  .toast.fail h2{color:var(--tangerine)}
  .toast p{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.55}
  .toast button{width:100%}
  .next{background:var(--emerald);color:#fff;box-shadow:0 5px 0 var(--emerald-d)}
  .retry{background:var(--indigo);color:#fff;box-shadow:0 5px 0 #1C2A6B}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:24px}

  /* ==== Câu hỏi củng cố ==== */
  .qopts{display:grid;grid-template-columns:1fr;gap:8px;margin:14px 0 6px}
  .qopt{background:#EEF0F7;color:var(--ink);font-size:14px;padding:11px 10px;
    border-radius:10px;box-shadow:none;text-align:left;border:none;cursor:pointer;
    font-family:"Be Vietnam Pro",sans-serif;font-weight:500}
  .qopt.correct{background:var(--emerald);color:#fff}
  .qopt.wrong{background:#E85D5D;color:#fff}
  .qopt:disabled{cursor:default;opacity:.92}
  .qexp{font-size:13px;color:var(--indigo);background:#F1F4FF;border-radius:10px;
    padding:10px 12px;margin:10px 0 14px;text-align:left;line-height:1.5}

  /* ==== Pháo giấy ==== */
  .confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:15}
  .confetti i{position:absolute;top:-16px;width:8px;height:13px;border-radius:2px;
    opacity:.95;animation:cfall linear forwards}
  @keyframes cfall{
    0%{transform:translateY(0) rotate(0deg)}
    100%{transform:translateY(580px) rotate(660deg);opacity:.7}
  }

/* ==== Cải tiến: dải nhận diện cấp lớp (tông tím lớp 12) + đồng hồ ==== */
:root{--indigo:#5B3FBF;--indigo-soft:#9385E6;--tangerine:#D6479A;--emerald:#5B3FBF;--gradec:#5B3FBF;--grade2:#D6479A}
.sct-ribbon{display:flex;align-items:center;justify-content:space-between;gap:10px;
  margin:0 0 16px;flex-wrap:wrap}
.sct-ribbon::before{content:"";position:absolute;left:0;right:0;top:0;height:5px;
  background:linear-gradient(90deg,var(--gradec),var(--grade2));z-index:5}
.sct-back{font:600 13px/1 "Baloo 2",system-ui,sans-serif;color:var(--gradec);
  text-decoration:none;background:#fff;border:1px solid var(--line);border-radius:999px;
  padding:9px 15px;transition:.15s;white-space:nowrap}
.sct-back:hover{border-color:var(--gradec);transform:translateX(-2px)}
.sct-tag{font:700 12px/1 "Baloo 2",system-ui,sans-serif;letter-spacing:.6px;color:#fff;
  background:var(--gradec);border-radius:999px;padding:8px 15px;white-space:nowrap}
.sct-timer{font:600 13px/1 "Baloo 2",system-ui,sans-serif !important;
  background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:999px;
  padding:5px 13px;color:var(--gradec);display:inline-flex;align-items:center;gap:5px}
.sct-timer b{color:var(--grade2);font-weight:700}

.wrap{position:relative}
</style>
</head>
<body>
<div class="wrap">
  <div class="sct-ribbon">
    <a class="sct-back" href="../">← Về Sân Chơi Toán Học</a>
    <span class="sct-tag">LỚP 12 · HƯỚNG MỞ RỘNG</span>
  </div>

  <header>
    <h1>Nhà Thiết Kế<span class="dot">.</span></h1>
    <span class="sub">Toán 12 · Ứng dụng đạo hàm · bài toán tối ưu</span>
  </header>

  <div class="mission">
    <div class="ctx" id="ctxEmoji">🌱</div>
    <div class="txt" id="ctxText"></div>
  </div>

  <div class="stage">
    <div class="hud">
      <span class="chip">Bản vẽ <b id="lvl">1</b>/<span id="lvlMax">4</span></span>
      <span class="chip">Điểm <b id="score">0</b></span>
      <span class="chip">⭐ <b id="stars">0</b>/<span id="starsMax">12</span></span>
      <button class="chip" id="sndBtn" title="Bật/tắt âm thanh">🔊</button>
    </div>
    <canvas id="cv" width="900" height="500"></canvas>
    <div class="toast" id="toast">
      <div class="box">
        <div class="stars" id="tStars"></div>
        <h2 id="tTitle"></h2>
        <p id="tMsg"></p>
        <button id="tBtn" class="next"></button>
      </div>
    </div>
    <div class="toast" id="quiz"><div class="box" id="quizBox"></div></div>
  </div>

  <div class="panel">
    <div class="card">
      <h3>🛠️ Bàn thiết kế</h3>
      <canvas id="obj" width="600" height="280"></canvas>
      <div class="ctrl">
        <label id="xLabel">Tham số <span class="val" id="xShow">0</span></label>
        <input type="range" id="xRange" min="0" max="20" step="0.5" value="0">
      </div>
      <div class="reads" id="reads"></div>
      <div class="slope" id="slope"></div>
      <div class="actions">
        <button class="act lock" id="lockBtn">Chốt thiết kế ✅</button>
        <button class="act reset" id="resetBtn">Chơi lại</button>
      </div>
    </div>
    <div class="card">
      <h3>🧮 Hàm số &amp; đạo hàm</h3>
      <div class="formula"><div class="row" id="fRow"></div><div class="row" id="fpRow"></div></div>
      <div class="tip" id="tip"></div>
    </div>
  </div>

  <footer>Một hoạt động dạy học môn Toán · tối ưu hiện hình khi tiếp tuyến nằm ngang.</footer>
</div>

<script>
/* ===================================================================
   CẤU HÌNH BÁO ĐIỂM VỀ APP LUYỆN TẬP
   Khi triển khai, đặt origin thật của App Luyện Tập, ví dụ:
   const SCT_APP_ORIGIN = 'https://sanchoitoanhoc.web.app';
   Mặc định dùng origin của trang; mở bằng file:// tự hạ về '*'.
=================================================================== */
const SCT_APP_ORIGIN = window.SCT_APP_ORIGIN || window.location.origin;
const SCT_TARGET = /^https?:/i.test(SCT_APP_ORIGIN) ? SCT_APP_ORIGIN : '*';

const $=id=>document.getElementById(id);
const cv=$('cv'), ctx=cv.getContext('2d'), oc=$('obj'), octx=oc.getContext('2d');
const fmt=v=>(Math.round(v*100)/100).toLocaleString('vi-VN');
const PI=Math.PI;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const fmtT=s=>Math.floor(s/60)+':'+String(s%60).padStart(2,'0');

/* ===== Âm thanh (Web Audio) ===== */
const SFX=(function(){
  let ac=null, muted=false;
  function ctxA(){
    if(muted) return null;
    if(!ac){ try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
    if(ac.state==='suspended') ac.resume();
    return ac;
  }
  function tone(f,d,type,t0,vol){
    const a=ctxA(); if(!a) return;
    const o=a.createOscillator(),gn=a.createGain();
    o.type=type||'sine'; o.frequency.value=f;
    gn.gain.setValueAtTime(vol||.16,a.currentTime+t0);
    gn.gain.exponentialRampToValueAtTime(.001,a.currentTime+t0+d);
    o.connect(gn); gn.connect(a.destination);
    o.start(a.currentTime+t0); o.stop(a.currentTime+t0+d+.05);
  }
  return {
    win(){ [523,659,784,1047].forEach((f,i)=>tone(f,.2,'sine',i*.095,.18)); },
    fail(){ tone(185,.22,'sawtooth',0,.1); tone(140,.3,'sawtooth',.09,.1); },
    ding(){ tone(880,.15,'sine',0,.16); tone(1175,.2,'sine',.08,.14); },
    buzz(){ tone(160,.25,'square',0,.08); },
    toggle(){ muted=!muted; return muted; }
  };
})();
$('sndBtn').addEventListener('click',()=>{ $('sndBtn').textContent = SFX.toggle() ? '🔇' : '🔊'; });

/* ===== Pháo giấy ===== */
function confetti(){
  const box=document.createElement('div'); box.className='confetti';
  const colors=['#D6479A','#5B3FBF','#9385E6','#FFC94D','#1FA36B','#FF7A1A'];
  for(let i=0;i<38;i++){
    const p=document.createElement('i');
    p.style.left=(Math.random()*100)+'%';
    p.style.background=colors[i%colors.length];
    p.style.animationDuration=(1+Math.random()*0.9)+'s';
    p.style.animationDelay=(Math.random()*0.35)+'s';
    box.appendChild(p);
  }
  document.querySelector('.stage').appendChild(box);
  setTimeout(()=>box.remove(),2300);
}

/* ===== Các bản vẽ =====
   live:true  → thấy toàn bộ đường cong (khám phá)
   live:false → ĐƯỜNG CONG VÀ GIÁ TRỊ HÀM BỊ ẨN, chỉ còn dấu của f'(x)
                → phải "dò" cực trị bằng chính đạo hàm, hoặc giải f'=0   */
const LEVELS=[
 { emoji:"🌱", goal:"max", xMin:0,xMax:20,step:0.5, optX:10,optVal:200, live:true,
   text:"Rào một vườn rau hình chữ nhật <b>cạnh con sông</b> (sông là một cạnh, không cần rào). Tổng hàng rào <b>40 m</b>. Tìm bề rộng <b>x</b> để <b>diện tích lớn nhất</b>.",
   f:x=>x*(40-2*x), fp:x=>40-4*x,
   fLabel:"Diện tích", unit:"m²",
   reads:x=>[["rộng x",fmt(x)+" m"],["dài 40−2x",fmt(40-2*x)+" m"],["diện tích",fmt(x*(40-2*x))+" m²"]],
   frow:"A(x) = x·(40 − 2x) = 40x − 2x²", fprow:"A'(x) = 40 − 4x",
   draw:(x)=>drawFence(x),
   tip:`Diện tích lớn nhất khi <b>A'(x)=0</b> ⇒ x = 10. Trên đồ thị, đó là lúc <b>tiếp tuyến nằm ngang</b>.` },

 { emoji:"📦", goal:"max", xMin:0,xMax:6,step:0.25, optX:2,optVal:128, live:true,
   text:"Cắt 4 góc vuông cạnh <b>x</b> từ tấm bìa vuông <b>12×12</b> rồi gấp thành <b>hộp không nắp</b>. Tìm x để <b>thể tích lớn nhất</b>.",
   f:x=>x*(12-2*x)**2, fp:x=>12*x*x-96*x+144,
   fLabel:"Thể tích", unit:"đv³",
   reads:x=>[["cắt góc x",fmt(x)],["đáy 12−2x",fmt(12-2*x)],["thể tích",fmt(x*(12-2*x)**2)]],
   frow:"V(x) = x·(12 − 2x)²", fprow:"V'(x) = 12x² − 96x + 144 = 12(x−2)(x−6)",
   draw:(x)=>drawBox(x),
   tip:`V'(x)=0 cho x=2 hoặc x=6; x=6 làm đáy bằng 0 nên loại. <b>x = 2</b> cho thể tích lớn nhất.` },

 { emoji:"🥫", goal:"min", xMin:1,xMax:4,step:0.1, optX:2,optVal:24*PI, live:false,
   text:"Thiết kế <b>lon nước hình trụ</b> thể tích cố định <b>16π</b>. Tìm bán kính <b>r</b> để <b>tốn ít vật liệu nhất</b> (diện tích toàn phần nhỏ nhất).",
   f:r=>2*PI*r*r+32*PI/r, fp:r=>4*PI*r-32*PI/(r*r),
   fLabel:"Vật liệu", unit:"đv²",
   reads:r=>[["bán kính r",fmt(r)],["cao h=16/r²",fmt(16/(r*r))],["vật liệu S",fmt(2*PI*r*r+32*PI/r)]],
   frow:"S(r) = 2πr² + 32π/r", fprow:"S'(r) = 4πr − 32π/r²",
   draw:(r)=>drawCan(r),
   tip:`Đường cong bị ẩn! Hãy dựa vào <b>dấu của S'(r)</b>: còn âm thì hàm đang giảm (đi tiếp), chuyển sang dương là đã vượt cực tiểu. Hoặc giải thẳng S'(r)=0.` },

 { emoji:"🪣", goal:"min", xMin:1,xMax:8,step:0.25, optX:4,optVal:48, live:false,
   text:"Làm <b>bể nước đáy vuông, không nắp</b>, thể tích <b>32</b>. Tìm cạnh đáy <b>x</b> để <b>tốn ít vật liệu nhất</b>.",
   f:x=>x*x+128/x, fp:x=>2*x-128/(x*x),
   fLabel:"Vật liệu", unit:"đv²",
   reads:x=>[["cạnh đáy x",fmt(x)],["cao h=32/x²",fmt(32/(x*x))],["vật liệu S",fmt(x*x+128/x)]],
   frow:"S(x) = x² + 4·(32/x²)·x = x² + 128/x", fprow:"S'(x) = 2x − 128/x²",
   draw:(x)=>drawTank(x),
   tip:`Bản vẽ cuối — vẫn ẩn đường cong. Giải <b>S'(x) = 0</b> ⇔ 2x = 128/x² ⇔ x³ = 64 rồi chốt đúng nghiệm.` },
];

let lvlIdx=0, score=0, x=0, cur=null;
let attempts=0, revealed=false;
let levelStars={}, starsTotal=0;
let quizCorrect=0, quizAsked=0;
const clearedOnce=new Set(), quizDone=new Set();
const hidden=()=>!cur.live && !revealed;

/* ===== Báo kết quả về App Luyện Tập (origin giới hạn) ===== */
const SCT_done=new Set();
function SCTreport(){
  var total=LEVELS.length, cleared=SCT_done.size;
  var percent=Math.round(cleared/total*100);
  var payload={source:'SCT_GAME',type:'RESULT',game:'thiet-ke',
    percent:percent, stars:starsTotal, starsMax:total*3,
    timeSec:(window.SCT_elapsed?window.SCT_elapsed():0),
    quizCorrect:quizCorrect, quizAsked:quizAsked,
    detail:cleared+'/'+total+' bản vẽ · '+starsTotal+'/'+(total*3)+' sao · củng cố đúng '+quizCorrect+'/'+quizAsked};
  try{ if(window.opener&&!window.opener.closed) window.opener.postMessage(payload,SCT_TARGET); }catch(e){}
  try{ if(window.parent&&window.parent!==window) window.parent.postMessage(payload,SCT_TARGET); }catch(e){}
}

// ===== Đồ thị f(x) =====
let M={l:54,r:18,t:18,b:38}, plotW=0, plotH=0, yLo=0, yHi=1;
function fit(){
  const cssW=cv.clientWidth, cssH=cssW*(500/900), dpr=window.devicePixelRatio||1;
  cv.width=Math.round(cssW*dpr);cv.height=Math.round(cssH*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);
  plotW=cssW-M.l-M.r; plotH=cssH-M.t-M.b;
}
function yRange(){
  let lo=Infinity,hi=-Infinity;
  for(let t=cur.xMin;t<=cur.xMax+1e-9;t+=(cur.xMax-cur.xMin)/120){const v=cur.f(t);lo=Math.min(lo,v);hi=Math.max(hi,v);}
  const pad=(hi-lo)*0.12; yLo=Math.max(0,lo-pad); yHi=hi+pad;
}
const PX=t=>M.l+(t-cur.xMin)/(cur.xMax-cur.xMin)*plotW;
const PY=v=>M.t+plotH-(v-yLo)/(yHi-yLo)*plotH;

function drawGraph(){
  yRange(); const cssW=cv.clientWidth,cssH=cssW*(500/900);
  ctx.clearRect(0,0,cssW,cssH);
  // lưới + nhãn y (ẩn nhãn giá trị khi ở chế độ dò — tránh đọc ngược ra cực trị)
  ctx.font='11px "Be Vietnam Pro"';
  for(let g=0;g<=4;g++){const v=yLo+(yHi-yLo)*g/4,y=PY(v);
    ctx.strokeStyle='#EEF1F6';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(M.l,y);ctx.lineTo(M.l+plotW,y);ctx.stroke();
    if(!hidden()){ctx.fillStyle='#9098AC';ctx.fillText(Math.round(v),6,y+4);}}
  // trục x nhãn
  ctx.fillStyle='#9098AC';
  for(let t=Math.ceil(cur.xMin);t<=cur.xMax;t+= (cur.xMax-cur.xMin>10?2:1)){ctx.fillText(t,PX(t)-3,M.t+plotH+18);}
  ctx.fillStyle='#6A7184';ctx.font='12px "Be Vietnam Pro"';
  ctx.fillText(cur.fLabel, 6, M.t-4); ctx.fillText('tham số', M.l+plotW-52, M.t+plotH+30);

  const m=cur.fp(x), flat=Math.abs(m)<0.6;
  // Chế độ dò: neo điểm vào GIỮA màn hình để không lộ hình dáng đường cong
  // (nếu để điểm chạy theo f(x), kéo chậm là "vẽ lại" được đồ thị bằng mắt)
  const y0 = hidden() ? (yLo+yHi)/2 : cur.f(x);

  if(hidden()){
    // CHẾ ĐỘ DÒ BẰNG ĐẠO HÀM: không vẽ đường cong — chỉ điểm + tiếp tuyến
    ctx.fillStyle='#C9D2E8'; ctx.font='700 54px "Baloo 2"';
    ctx.fillText('?', M.l+plotW/2-14, M.t+56);
    ctx.font='600 13px "Be Vietnam Pro"'; ctx.fillStyle='#6A7184';
    ctx.fillText('Đường cong ẩn — hãy lái theo DẤU của f\'(x)', M.l+plotW/2-140, M.t+80);
  } else {
    // đường cong
    ctx.strokeStyle='#2A3B8F';ctx.lineWidth=3;ctx.beginPath();
    let first=true;
    for(let t=cur.xMin;t<=cur.xMax+1e-9;t+=(cur.xMax-cur.xMin)/200){const px=PX(t),py=PY(cur.f(t));first?(ctx.moveTo(px,py),first=false):ctx.lineTo(px,py);}
    ctx.stroke();
  }
  // tiếp tuyến tại x (luôn hiện — chính là "la bàn" của chế độ dò)
  ctx.strokeStyle=flat?'#1FA36B':'#FF7A1A';ctx.lineWidth=2.5;ctx.setLineDash([]);
  const dxw=(cur.xMax-cur.xMin)*0.22;
  ctx.beginPath();
  ctx.moveTo(PX(x-dxw),PY(y0+m*(-dxw)));
  ctx.lineTo(PX(x+dxw),PY(y0+m*(dxw)));
  ctx.stroke();
  // điểm hiện tại
  ctx.fillStyle='#FF7A1A';ctx.strokeStyle='#fff';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(PX(x),PY(y0),8,0,7);ctx.fill();ctx.stroke();
  // đường gióng xuống trục
  ctx.strokeStyle='#FFB169';ctx.setLineDash([4,4]);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(PX(x),PY(y0));ctx.lineTo(PX(x),M.t+plotH);ctx.stroke();ctx.setLineDash([]);
}

// ===== Vẽ vật thể (canvas nhỏ) =====
function clearObj(){const w=oc.clientWidth,h=140;const dpr=window.devicePixelRatio||1;
  oc.width=Math.round(w*dpr);oc.height=Math.round(h*dpr);octx.setTransform(dpr,0,0,dpr,0,0);octx.clearRect(0,0,w,h);return{w,h};}
function drawFence(x){const{w,h}=clearObj();const L=40,s=Math.min((w-60)/L,(h-50)/20);
  const rw=(L-2*x)*s, rh=x*s, ox=(w-rw)/2, oy=h-20-rh;
  octx.strokeStyle='#3AA0E0';octx.lineWidth=4;octx.beginPath();octx.moveTo(ox-15,oy);octx.lineTo(ox+rw+15,oy);octx.stroke();
  octx.fillStyle='#3AA0E0';octx.font='11px "Be Vietnam Pro"';octx.fillText('sông',ox+rw/2-12,oy-6);
  octx.strokeStyle='#15784E';octx.lineWidth=3;
  octx.beginPath();octx.moveTo(ox,oy);octx.lineTo(ox,oy+rh);octx.lineTo(ox+rw,oy+rh);octx.lineTo(ox+rw,oy);octx.stroke();
  octx.fillStyle='rgba(31,163,107,.12)';octx.fillRect(ox,oy,rw,rh);
  octx.fillStyle='#1C2438';octx.font='bold 11px "Be Vietnam Pro"';
  octx.fillText('x',ox-14,oy+rh/2);octx.fillText('40−2x',ox+rw/2-18,oy+rh+15);}
function drawBox(x){const{w,h}=clearObj();const a=12,s=Math.min((w-60)/a,(h-40)/a),side=a*s,ox=(w-side)/2,oy=(h-side)/2,cs=x*s;
  octx.strokeStyle='#B97D08';octx.lineWidth=2;octx.strokeRect(ox,oy,side,side);
  octx.fillStyle='rgba(232,163,23,.12)';octx.fillRect(ox,oy,side,side);
  octx.fillStyle='rgba(192,57,43,.35)';
  [[ox,oy],[ox+side-cs,oy],[ox,oy+side-cs],[ox+side-cs,oy+side-cs]].forEach(c=>octx.fillRect(c[0],c[1],cs,cs));
  octx.fillStyle='#1C2438';octx.font='bold 11px "Be Vietnam Pro"';octx.fillText('cắt x',ox+2,oy+cs/2+4);}
function drawCan(r){const{w,h}=clearObj();const hh=16/(r*r),s=Math.min((w-70)/8,(h-40)/8);
  const cw=2*r*s, ch=hh*s, ox=w/2, oy=h-20;
  octx.strokeStyle='#C0392B';octx.fillStyle='rgba(192,57,43,.10)';octx.lineWidth=2;
  octx.beginPath();octx.rect(ox-cw/2,oy-ch,cw,ch);octx.fill();octx.stroke();
  octx.beginPath();octx.ellipse(ox,oy-ch,cw/2,cw/6,0,0,7);octx.stroke();
  octx.fillStyle='#1C2438';octx.font='bold 11px "Be Vietnam Pro"';
  octx.fillText('r',ox+2,oy-ch-cw/6-3);octx.fillText('h',ox+cw/2+4,oy-ch/2);}
function drawTank(x){const{w,h}=clearObj();const hh=32/(x*x),s=Math.min((w-70)/8,(h-40)/8);
  const bw=x*s, bh=hh*s, d=bw*0.35, ox=w/2-bw/2, oy=h-20-bh;
  octx.strokeStyle='#2A3B8F';octx.fillStyle='rgba(42,59,143,.10)';octx.lineWidth=2;
  octx.beginPath();octx.rect(ox,oy,bw,bh);octx.fill();octx.stroke();
  octx.beginPath();octx.moveTo(ox,oy);octx.lineTo(ox+d,oy-d*0.6);octx.lineTo(ox+bw+d,oy-d*0.6);octx.lineTo(ox+bw,oy);octx.stroke();
  octx.setLineDash([3,3]);octx.beginPath();octx.moveTo(ox+bw,oy);octx.lineTo(ox+bw+d,oy-d*0.6);octx.stroke();octx.setLineDash([]);
  octx.fillStyle='#1C2438';octx.font='bold 11px "Be Vietnam Pro"';
  octx.fillText('x',ox+bw/2-3,oy+bh+14);octx.fillText('h',ox-12,oy+bh/2);}

// ===== Bảng =====
function updatePanel(){
  $('xShow').textContent=fmt(x);
  const rd=cur.reads(x);
  if(hidden()) rd[rd.length-1][1]='<span style="color:#D6479A">?</span>';   // giấu giá trị hàm mục tiêu
  $('reads').innerHTML=rd.map(r=>`<div class="rd"><div class="lab">${r[0]}</div><div class="num">${r[1]}</div></div>`).join('');
  const m=cur.fp(x), sl=$('slope');
  if(Math.abs(m)<0.6){ sl.className='slope zero'; sl.innerHTML=`Độ dốc <span class="mono">f'(x) ≈ 0</span> — tiếp tuyến gần nằm ngang! 🎯`; }
  else if(m>0){ sl.className='slope pos'; sl.innerHTML=`Độ dốc <span class="mono">f'(x) = ${fmt(m)} &gt; 0</span> — hàm đang tăng.`; }
  else { sl.className='slope neg'; sl.innerHTML=`Độ dốc <span class="mono">f'(x) = ${fmt(m)} &lt; 0</span> — hàm đang giảm.`; }
}
function render(){ drawGraph(); cur.draw(x); updatePanel(); }

function setLevel(i){
  lvlIdx=i; cur=LEVELS[i]; attempts=0; revealed=false; x=cur.xMin;
  $('lvl').textContent=i+1; $('ctxEmoji').textContent=cur.emoji;
  $('ctxText').innerHTML=cur.text + (cur.live ? '' :
    ' <span class="expert">· Chế độ dò bằng đạo hàm: đường cong ẩn — chỉ còn dấu của f′(x) dẫn đường!</span>');
  $('score').textContent=score;
  const rng=$('xRange'); rng.min=cur.xMin; rng.max=cur.xMax; rng.step=cur.step; rng.value=cur.xMin;
  $('xLabel').firstChild.textContent = (cur.goal==="max"?"Tăng/giảm tham số để TỐI ĐA ":"Điều chỉnh để TỐI THIỂU ");
  $('fRow').innerHTML=`<span class="mono">${cur.frow}</span>`;
  $('fpRow').innerHTML=`<span class="mono">${cur.fprow}</span> → <b>cho f'(x) = 0</b>`;
  $('tip').innerHTML=cur.tip;
  $('lockBtn').textContent="Chốt thiết kế ✅";
  fit(); render();
}

/* ===== Câu hỏi củng cố: giải f'(x) = 0 bằng đại số ===== */
function makeQuiz(){
  const i=lvlIdx; let t;
  if(i===0){
    t={q:"Giải A'(x) = 40 − 4x = 0 và kết luận:",
      correct:'x = 10; A đổi dấu từ + sang − tại đó nên A(10) = 200 m² là giá trị lớn nhất',
      opts:['x = 10; A đổi dấu từ + sang − tại đó nên A(10) = 200 m² là giá trị lớn nhất',
            'x = 4; vì hệ số của x là 4',
            'x = 20; dùng hết 40 m rào cho chiều rộng',
            'x = 40; nghiệm của 40 − 4x = 0'],
      exp:"40 − 4x = 0 ⇔ x = 10. Với x < 10 thì A' > 0 (tăng), x > 10 thì A' < 0 (giảm) → x = 10 là điểm cực đại, A = 10·20 = 200 m²."};
  } else if(i===1){
    t={q:"V'(x) = 12(x−2)(x−6) = 0 có hai nghiệm x = 2 và x = 6. Vì sao loại x = 6?",
      correct:'Vì khi x = 6, cạnh đáy 12 − 2x = 0 — hộp bẹp dí, thể tích bằng 0',
      opts:['Vì khi x = 6, cạnh đáy 12 − 2x = 0 — hộp bẹp dí, thể tích bằng 0',
            'Vì 6 là số chẵn nên không hợp lệ',
            'Vì x = 6 nằm ngoài tấm bìa 12×12',
            'Không cần loại — cả hai nghiệm đều cho thể tích lớn nhất'],
      exp:'Điều kiện bài toán: 0 < x < 6 (để đáy 12 − 2x > 0). Nghiệm x = 6 nằm ở biên làm V = 0, chỉ x = 2 cho cực đại V = 2·8² = 128.'};
  } else if(i===2){
    t={q:"Giải S'(r) = 4πr − 32π/r² = 0:",
      correct:'r³ = 8 ⇒ r = 2, khi đó h = 16/r² = 4 = 2r (cao bằng đường kính)',
      opts:['r³ = 8 ⇒ r = 2, khi đó h = 16/r² = 4 = 2r (cao bằng đường kính)',
            'r² = 8 ⇒ r ≈ 2,83',
            'r = 32/4 = 8',
            'r = π vì các hệ số đều chứa π'],
      exp:'4πr = 32π/r² ⇔ r³ = 8 ⇔ r = 2. Kết quả đẹp: lon tiết kiệm vật liệu nhất luôn có chiều cao bằng đường kính — đúng tỉ lệ của nhiều lon thật!'};
  } else {
    t={q:"Giải S'(x) = 2x − 128/x² = 0:",
      correct:'x³ = 64 ⇒ x = 4, khi đó h = 32/16 = 2',
      opts:['x³ = 64 ⇒ x = 4, khi đó h = 32/16 = 2',
            'x² = 64 ⇒ x = 8',
            'x = 128/2 = 64',
            'x = √128 ≈ 11,3'],
      exp:'2x = 128/x² ⇔ x³ = 64 ⇔ x = 4. Vật liệu ít nhất S = 16 + 32 = 48 đv². Lưu ý mũ ba xuất hiện vì nhân hai vế với x².'};
  }
  t.opts=shuffle([...new Set(t.opts)]);
  return t;
}
function showQuiz(onDone,nextLabel){
  const qz=makeQuiz(); quizAsked++;
  const q=$('quiz'), box=$('quizBox');
  box.innerHTML=`<div style="font-size:42px">✏️</div>
    <h2 style="color:var(--indigo);font-family:'Baloo 2'">Câu hỏi củng cố</h2>
    <p style="margin-bottom:0">${qz.q}</p>
    <div class="qopts"></div>
    <div class="qexp" style="display:none"></div>
    <button class="next" style="display:none;font-family:'Baloo 2';font-weight:600;border:none;border-radius:12px;padding:13px;cursor:pointer">${nextLabel}</button>`;
  const wrap=box.querySelector('.qopts');
  const expEl=box.querySelector('.qexp');
  const nextBtn=box.querySelector('button.next');
  qz.opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='qopt'; b.textContent=o;
    b.onclick=()=>{
      wrap.querySelectorAll('button').forEach(xx=>{
        xx.disabled=true;
        if(xx.textContent===qz.correct) xx.classList.add('correct');
      });
      const okA=(o===qz.correct);
      if(!okA){ b.classList.add('wrong'); SFX.buzz(); }
      else{ quizCorrect++; score+=50; $('score').textContent=score; SFX.ding(); }
      expEl.style.display='block';
      expEl.innerHTML=(okA?'✅ Chính xác! +50 điểm. ':'❌ Chưa đúng. ')+qz.exp;
      nextBtn.style.display='block';
      SCTreport();
    };
    wrap.appendChild(b);
  });
  nextBtn.onclick=()=>{ q.className='toast'; onDone(); };
  q.className='toast show';
}

function finalToast(){
  const time=window.SCT_elapsed?fmtT(window.SCT_elapsed()):'—';
  showToast(true,'🏆','Kiến trúc sư tối ưu!',
    `Hoàn thành cả ${LEVELS.length} bản vẽ: ${score} điểm · ${starsTotal}/${LEVELS.length*3} ⭐ · củng cố đúng ${quizCorrect}/${quizAsked} · thời gian ${time}. Đạo hàm chính là chiếc "thước tối ưu" của người thiết kế!`,
    'Chơi lại từ đầu','next',
    ()=>{ score=0; setLevel(0); });
}

function lock(){
  attempts++;
  const diff=Math.abs(x-cur.optX), tol=cur.step;
  if(diff>4*tol){
    SFX.fail();
    const dir = (cur.goal==="max") ? "Đại lượng chưa lớn nhất" : "Vật liệu chưa ít nhất";
    const hint = hidden()
      ? `Dựa vào DẤU của f'(x): ${cur.goal==="min"?"còn âm thì đi tiếp sang phải, đã dương là vượt quá":"còn dương thì đi tiếp sang phải, đã âm là vượt quá"}. `
        + (attempts>=3 ? `Hoặc giải ${cur.fprow.split('=')[0].trim()} = 0 bằng đại số.` : '')
      : `Hãy tìm chỗ tiếp tuyến nằm ngang (f'(x) = 0) — đó là điểm tối ưu.`;
    showToast(false,'',dir,hint,'Thử lại','retry',()=>{});
    return;
  }
  // thành công
  let s = diff<tol*0.5?3 : diff<=2*tol?2 : 1;
  if(attempts>=2) s=Math.min(s,2);
  if(attempts>=4) s=1;
  if(hidden()){ revealed=true; render(); }   // lộ đường cong để "kiểm chứng bằng mắt"
  levelStars[lvlIdx]=Math.max(s,levelStars[lvlIdx]||0);
  starsTotal=Object.values(levelStars).reduce((a,b)=>a+b,0);
  $('stars').textContent=starsTotal;
  if(!clearedOnce.has(lvlIdx)){ score+=100; $('score').textContent=score; clearedOnce.add(lvlIdx); }
  SCT_done.add(lvlIdx); SCTreport();
  SFX.win(); confetti();
  const last=lvlIdx===LEVELS.length-1;
  const goalTxt=cur.goal==="max"?`đạt giá trị lớn nhất ≈ ${fmt(cur.optVal)} ${cur.unit}`:`tốn ít vật liệu nhất ≈ ${fmt(cur.optVal)} ${cur.unit}`;
  const goNext=()=>{ last ? finalToast() : setLevel(lvlIdx+1); };
  const msg=`Tại <b>x = ${fmt(cur.optX)}</b>, f'(x)=0 và ${goalTxt} — đạt ${'⭐'.repeat(s)} sau ${attempts} lượt chốt.`;
  if(quizDone.has(lvlIdx)){
    showToast(true,'★'.repeat(s)+'☆'.repeat(3-s), s===3?'Thiết kế tối ưu!':'Đạt yêu cầu!', msg,
      last?'Xem tổng kết 🏆':'Bản vẽ tiếp','next',goNext);
  } else {
    quizDone.add(lvlIdx);
    showToast(true,'★'.repeat(s)+'☆'.repeat(3-s), s===3?'Thiết kế tối ưu!':'Đạt yêu cầu!', msg,
      'Câu hỏi củng cố ✏️','next',
      ()=>showQuiz(goNext, last?'Xem tổng kết 🏆':'Bản vẽ tiếp'));
  }
}
function showToast(ok,star,title,msg,btn,cls,act){
  const t=$('toast');
  t.className='toast show'+(ok?'':' fail');
  $('tStars').textContent=star; $('tStars').style.display=ok&&star?'block':'none';
  $('tTitle').textContent=title; $('tMsg').innerHTML=msg;
  const b=$('tBtn'); b.textContent=btn; b.className=cls; b.onclick=()=>{t.className='toast';act();};
}

$('xRange').addEventListener('input',e=>{x=+e.target.value;render();});
$('lockBtn').addEventListener('click',lock);
$('resetBtn').addEventListener('click',()=>{score=0;$('toast').className='toast';$('quiz').className='toast';setLevel(0);});
window.addEventListener('resize',()=>{fit();render();});
window.addEventListener('keydown',e=>{
  if(e.key==='Enter' && !$('toast').classList.contains('show') && !$('quiz').classList.contains('show'))
    lock();
});

$('lvlMax').textContent=LEVELS.length;
$('starsMax').textContent=LEVELS.length*3;
setLevel(0);
</script>

<script>
/* ==== Đồng hồ đo thời gian chơi (bản cũ THIẾU khối này) ==== */
(function(){
  var sec=0, started=false, running=false;
  function fmt(s){var m=Math.floor(s/60);return m+':'+String(s%60).padStart(2,'0');}
  var chip=document.createElement('span');
  chip.className='sct-timer';
  chip.innerHTML='⏱ <b id="sctClock">0:00</b>';
  function mount(){
    var host=document.querySelector('.hud')||document.querySelector('.top');
    if(host){ host.appendChild(chip); }
    else{ chip.style.position='fixed'; chip.style.top='12px'; chip.style.right='12px';
          chip.style.zIndex='99'; document.body.appendChild(chip); }
  }
  function tick(){ if(running){ sec++; var c=document.getElementById('sctClock'); if(c) c.textContent=fmt(sec); } }
  function start(){ if(started) return; started=true; running=true; setInterval(tick,1000); }
  document.addEventListener('visibilitychange',function(){ running = started && !document.hidden; });
  ['pointerdown','keydown','input','change'].forEach(function(ev){ document.addEventListener(ev,start); });
  window.SCT_elapsed=function(){ return sec; };
  if(document.readyState!=='loading') mount();
  else document.addEventListener('DOMContentLoaded',mount);
})();
</script>
