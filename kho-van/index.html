<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kho Vận 3D — Toán 12</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBFAF4; --ink:#1C2438; --indigo:#2A3B8F; --indigo-soft:#6B7BD6;
    --tangerine:#FF7A1A; --tang-d:#C95C09; --emerald:#1FA36B; --emerald-d:#15784E;
    --red:#C0392B; --gold:#E8A317; --line:#E4E0D4; --muted:#6A7184;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Be Vietnam Pro",system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(120% 80% at 72% -10%, #E7ECF7 0%, transparent 55%),var(--paper);
    min-height:100vh;padding:18px 14px 40px}
  .wrap{max-width:960px;margin:0 auto}
  header{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  h1{font-family:"Baloo 2",sans-serif;font-weight:700;font-size:clamp(26px,5vw,40px);
    margin:0;letter-spacing:-.5px;color:var(--indigo)}
  h1 .dot{color:var(--tangerine)}
  .sub{color:var(--muted);font-size:14px;font-weight:500}
  .mission{background:linear-gradient(180deg,#fff,#F1F3FA);border:1px solid #D8DEF0;
    border-radius:14px;padding:12px 16px;margin:14px 0;display:flex;align-items:center;gap:12px}
  .mission .ctx{font-size:26px}.mission .txt{font-size:15px}.mission .txt b{color:var(--indigo)}
  .mission .txt .expert{color:#B0328A;font-weight:600}
  .stage{position:relative;background:linear-gradient(180deg,#F7FAFF,#EAF0FA);
    border:1px solid var(--line);border-radius:16px;overflow:hidden;
    box-shadow:0 10px 30px -18px rgba(42,59,143,.4)}
  canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}
  canvas:active{cursor:grabbing}
  .hud{position:absolute;top:10px;left:10px;display:flex;gap:8px;flex-wrap:wrap;
    font-family:"Baloo 2",sans-serif;font-weight:600;font-size:13px;z-index:10}
  .chip{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:999px;
    padding:4px 12px;color:var(--indigo)}.chip b{color:var(--tangerine)}
  button.chip{cursor:pointer;flex:none;font-size:13px;box-shadow:none;
    font-family:"Baloo 2",sans-serif;font-weight:600}
  .rothint{position:absolute;bottom:10px;right:12px;font-size:11.5px;color:var(--muted);
    background:rgba(255,255,255,.85);border-radius:8px;padding:3px 9px}
  .panel{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
  @media(max-width:640px){.panel{grid-template-columns:1fr}}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}
  .card h3{margin:0 0 12px;font-family:"Baloo 2",sans-serif;font-weight:600;font-size:15px;
    color:var(--indigo);display:flex;align-items:center;gap:7px}
  .stepper{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .stepper .axis{font-family:"Baloo 2",sans-serif;font-weight:600;width:18px;text-align:center}
  .stepper .axis.x{color:var(--red)}.stepper .axis.y{color:#1FA36B}.stepper .axis.z{color:#2A3B8F}
  .stepper button{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);
    background:#F4F6FB;font-size:20px;font-family:"Baloo 2",sans-serif;cursor:pointer;color:var(--ink)}
  .stepper button:active{transform:translateY(1px)}
  .stepper .v{flex:1;text-align:center;font-family:"JetBrains Mono",monospace;font-weight:600;
    font-size:20px;background:#0F1530;color:#FFD27A;border-radius:10px;padding:7px}
  .picks{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
  .picks button{font-family:"Be Vietnam Pro";font-weight:600;font-size:14px;border:1px solid var(--line);
    background:#fff;border-radius:10px;padding:11px 13px;cursor:pointer;text-align:left;display:flex;justify-content:space-between}
  .picks button.on{border-color:var(--indigo);background:#EEF1FB}
  .picks button .d{font-family:"JetBrains Mono",monospace;color:var(--indigo)}
  .actions{display:flex;gap:8px;margin-top:4px}
  button.act{font-family:"Baloo 2",sans-serif;font-weight:600;font-size:15px;border:none;
    border-radius:12px;padding:12px 14px;cursor:pointer;transition:transform .08s}
  button.act:active{transform:translateY(2px)}
  .go{flex:1;background:var(--tangerine);color:#fff;box-shadow:0 5px 0 var(--tang-d)}
  .go:active{box-shadow:0 3px 0 var(--tang-d)}
  .reset{background:#EEF0F7;color:var(--indigo)}
  .info{background:#0F1530;color:#E8ECFF;border-radius:12px;padding:14px 16px;font-family:"Baloo 2",sans-serif}
  .info .line{font-size:14px;line-height:1.9}
  .info .line .mono{font-family:"JetBrains Mono",monospace;color:#FFD27A}
  .info .line b{color:#86F0C0}
  .tip{font-size:12.5px;color:var(--muted);margin-top:12px;line-height:1.55}.tip b{color:var(--indigo)}
  .toast{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(15,21,48,.55);backdrop-filter:blur(2px);z-index:20}
  .toast.show{display:flex}
  .toast .box{background:#fff;border-radius:18px;padding:24px 26px;text-align:center;max-width:360px;
    width:calc(100% - 40px);box-shadow:0 20px 50px -20px rgba(0,0,0,.5)}
  .toast .stars{font-size:30px;letter-spacing:4px}
  .toast h2{font-family:"Baloo 2",sans-serif;margin:8px 0 4px;font-size:23px;color:var(--emerald-d)}
  .toast.fail h2{color:var(--tangerine)}
  .toast p{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.55}
  .toast button{width:100%}
  .next{background:var(--emerald);color:#fff;box-shadow:0 5px 0 var(--emerald-d)}
  .retry{background:var(--indigo);color:#fff;box-shadow:0 5px 0 #1C2A6B}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:24px}

  /* ==== Câu hỏi củng cố ==== */
  .qopts{display:grid;grid-template-columns:1fr;gap:8px;margin:14px 0 6px}
  .qopt{background:#EEF0F7;color:var(--ink);font-size:14px;padding:11px 10px;
    border-radius:10px;box-shadow:none;text-align:left;border:none;cursor:pointer;
    font-family:"Be Vietnam Pro",sans-serif;font-weight:500}
  .qopt.correct{background:var(--emerald);color:#fff}
  .qopt.wrong{background:#E85D5D;color:#fff}
  .qopt:disabled{cursor:default;opacity:.92}
  .qexp{font-size:13px;color:var(--indigo);background:#F1F4FF;border-radius:10px;
    padding:10px 12px;margin:10px 0 14px;text-align:left;line-height:1.5}

  /* ==== Pháo giấy ==== */
  .confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:15}
  .confetti i{position:absolute;top:-16px;width:8px;height:13px;border-radius:2px;
    opacity:.95;animation:cfall linear forwards}
  @keyframes cfall{
    0%{transform:translateY(0) rotate(0deg)}
    100%{transform:translateY(640px) rotate(660deg);opacity:.7}
  }

/* ==== Cải tiến: dải nhận diện cấp lớp (tông tím lớp 12) + đồng hồ ==== */
:root{--indigo:#5B3FBF;--indigo-soft:#9385E6;--tangerine:#D6479A;--emerald:#5B3FBF;--gradec:#5B3FBF;--grade2:#D6479A}
.sct-ribbon{display:flex;align-items:center;justify-content:space-between;gap:10px;
  margin:0 0 16px;flex-wrap:wrap}
.sct-ribbon::before{content:"";position:absolute;left:0;right:0;top:0;height:5px;
  background:linear-gradient(90deg,var(--gradec),var(--grade2));z-index:5}
.sct-back{font:600 13px/1 "Baloo 2",system-ui,sans-serif;color:var(--gradec);
  text-decoration:none;background:#fff;border:1px solid var(--line);border-radius:999px;
  padding:9px 15px;transition:.15s;white-space:nowrap}
.sct-back:hover{border-color:var(--gradec);transform:translateX(-2px)}
.sct-tag{font:700 12px/1 "Baloo 2",system-ui,sans-serif;letter-spacing:.6px;color:#fff;
  background:var(--gradec);border-radius:999px;padding:8px 15px;white-space:nowrap}
.sct-timer{font:600 13px/1 "Baloo 2",system-ui,sans-serif !important;
  background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:999px;
  padding:5px 13px;color:var(--gradec);display:inline-flex;align-items:center;gap:5px}
.sct-timer b{color:var(--grade2);font-weight:700}

.wrap{position:relative}
</style>
</head>
<body>
<div class="wrap">
  <div class="sct-ribbon">
    <a class="sct-back" href="../">← Về Sân Chơi Toán Học</a>
    <span class="sct-tag">LỚP 12 · HƯỚNG MỞ RỘNG</span>
  </div>

  <header>
    <h1>Kho Vận 3D<span class="dot">.</span></h1>
    <span class="sub">Toán 12 · Tọa độ Oxyz · khoảng cách · trung điểm · vectơ</span>
  </header>

  <div class="mission">
    <div class="ctx" id="ctxEmoji">📦</div>
    <div class="txt" id="ctxText"></div>
  </div>

  <div class="stage">
    <div class="hud">
      <span class="chip">Nhiệm vụ <b id="lvl">1</b>/<span id="lvlMax">4</span></span>
      <span class="chip">Điểm <b id="score">0</b></span>
      <span class="chip">⭐ <b id="stars">0</b>/<span id="starsMax">12</span></span>
      <button class="chip" id="sndBtn" title="Bật/tắt âm thanh">🔊</button>
    </div>
    <canvas id="cv" width="900" height="560"></canvas>
    <div class="rothint">Kéo để xoay khung cảnh ↻</div>
    <div class="toast" id="toast">
      <div class="box">
        <div class="stars" id="tStars"></div>
        <h2 id="tTitle"></h2>
        <p id="tMsg"></p>
        <button id="tBtn" class="next"></button>
      </div>
    </div>
    <div class="toast" id="quiz"><div class="box" id="quizBox"></div></div>
  </div>

  <div class="panel">
    <div class="card">
      <h3>🎮 Điều khiển</h3>
      <div id="moveCtrl">
        <div class="stepper"><span class="axis x">x</span><button data-a="x" data-d="-1">−</button><span class="v" id="vx">0</span><button data-a="x" data-d="1">+</button></div>
        <div class="stepper"><span class="axis y">y</span><button data-a="y" data-d="-1">−</button><span class="v" id="vy">0</span><button data-a="y" data-d="1">+</button></div>
        <div class="stepper"><span class="axis z">z</span><button data-a="z" data-d="-1">−</button><span class="v" id="vz">0</span><button data-a="z" data-d="1">+</button></div>
      </div>
      <div class="picks" id="pickCtrl" style="display:none"></div>
      <div class="actions">
        <button class="act go" id="goBtn">Giao hàng! 🚁</button>
        <button class="act reset" id="resetBtn">Chơi lại</button>
      </div>
    </div>
    <div class="card">
      <h3>📐 Số liệu &amp; công thức</h3>
      <div class="info"><div class="line" id="infoLine"></div></div>
      <div class="tip" id="tip"></div>
    </div>
  </div>

  <footer>Một hoạt động dạy học môn Toán · nhìn thấy tọa độ không gian từ mọi góc.</footer>
</div>

<script>
/* ===================================================================
   CẤU HÌNH BÁO ĐIỂM VỀ APP LUYỆN TẬP
   Khi triển khai, đặt origin thật của App Luyện Tập, ví dụ:
   const SCT_APP_ORIGIN = 'https://sanchoitoanhoc.web.app';
   Mặc định dùng origin của trang; mở bằng file:// tự hạ về '*'.
=================================================================== */
const SCT_APP_ORIGIN = window.SCT_APP_ORIGIN || window.location.origin;
const SCT_TARGET = /^https?:/i.test(SCT_APP_ORIGIN) ? SCT_APP_ORIGIN : '*';

const cv=document.getElementById('cv'), ctx=cv.getContext('2d'), $=id=>document.getElementById(id);
const fmt=v=>v.toFixed(2).replace('.',',');
function dist(a,b){const s=(a.x-b.x)**2+(a.y-b.y)**2+(a.z-b.z)**2;return {s,v:Math.sqrt(s)};}
const eq=(a,b)=>a.x===b.x&&a.y===b.y&&a.z===b.z;
const COL={x:'#C0392B',y:'#1FA36B',z:'#2A3B8F'};
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const fmtT=s=>Math.floor(s/60)+':'+String(s%60).padStart(2,'0');

/* ===== Âm thanh (Web Audio) ===== */
const SFX=(function(){
  let ac=null, muted=false;
  function ctxA(){
    if(muted) return null;
    if(!ac){ try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
    if(ac.state==='suspended') ac.resume();
    return ac;
  }
  function tone(f,d,type,t0,vol){
    const a=ctxA(); if(!a) return;
    const o=a.createOscillator(),gn=a.createGain();
    o.type=type||'sine'; o.frequency.value=f;
    gn.gain.setValueAtTime(vol||.16,a.currentTime+t0);
    gn.gain.exponentialRampToValueAtTime(.001,a.currentTime+t0+d);
    o.connect(gn); gn.connect(a.destination);
    o.start(a.currentTime+t0); o.stop(a.currentTime+t0+d+.05);
  }
  return {
    win(){ [523,659,784,1047].forEach((f,i)=>tone(f,.2,'sine',i*.095,.18)); },
    fail(){ tone(185,.22,'sawtooth',0,.1); tone(140,.3,'sawtooth',.09,.1); },
    ding(){ tone(880,.15,'sine',0,.16); tone(1175,.2,'sine',.08,.14); },
    buzz(){ tone(160,.25,'square',0,.08); },
    toggle(){ muted=!muted; return muted; }
  };
})();
$('sndBtn').addEventListener('click',()=>{ $('sndBtn').textContent = SFX.toggle() ? '🔇' : '🔊'; });

/* ===== Pháo giấy ===== */
function confetti(){
  const box=document.createElement('div'); box.className='confetti';
  const colors=['#D6479A','#5B3FBF','#9385E6','#FFC94D','#1FA36B','#FF7A1A'];
  for(let i=0;i<38;i++){
    const p=document.createElement('i');
    p.style.left=(Math.random()*100)+'%';
    p.style.background=colors[i%colors.length];
    p.style.animationDuration=(1+Math.random()*0.9)+'s';
    p.style.animationDelay=(Math.random()*0.35)+'s';
    box.appendChild(p);
  }
  document.querySelector('.stage').appendChild(box);
  setTimeout(()=>box.remove(),2300);
}

/* ===== Các nhiệm vụ ===== */
const LEVELS=[
 { emoji:"📦", mode:"move", drone:{x:0,y:0,z:0},
   text:"Một <b>kiện hàng</b> đang lơ lửng trong kho. Hãy xoay khung cảnh, đọc tọa độ rồi đưa <b>drone</b> tới đúng vị trí kiện hàng.",
   pts:[{name:"Kiện hàng",c:{x:4,y:2,z:3},color:'#E8A317',hideCoord:true}],
   target:{x:4,y:2,z:3},
   tip:`Mỗi điểm trong không gian có tọa độ <b>(x; y; z)</b>. Cây cột đứng giúp bạn đọc độ cao z.` },

 { emoji:"🏬", mode:"pick",
   text:"Đơn hàng cần giao tới điểm <b>P</b>. Có 3 kho. Hãy <b>tự tính khoảng cách</b> từng kho tới P rồi chọn <b>kho gần P nhất</b>.",
   pts:[{name:"P (điểm giao)",c:{x:3,y:3,z:2},color:'#FF7A1A'},
        {name:"Kho A",c:{x:1,y:1,z:0},color:'#2A3B8F'},
        {name:"Kho B",c:{x:5,y:2,z:1},color:'#2A3B8F'},
        {name:"Kho C",c:{x:0,y:5,z:3},color:'#2A3B8F'}],
   P:{x:3,y:3,z:2}, answer:"Kho B",
   tip:`Khoảng cách hai điểm: <b>√((Δx)²+(Δy)²+(Δz)²)</b>. Nhìn phẳng dễ nhầm — mắt thường thấy Kho C "có vẻ gần", nhưng chỉ phép tính mới phán quyết!` },

 { emoji:"🛰️", mode:"move", drone:{x:0,y:0,z:0},
   text:"Đặt một <b>trạm trung chuyển</b> ngay <b>chính giữa</b> hai kho A và B (trung điểm đoạn AB).",
   pts:[{name:"Kho A",c:{x:1,y:1,z:1},color:'#2A3B8F'},
        {name:"Kho B",c:{x:5,y:3,z:5},color:'#2A3B8F'}],
   A:{x:1,y:1,z:1}, B:{x:5,y:3,z:5}, target:{x:3,y:2,z:3},
   tip:`Trung điểm: <b>M = ((x_A+x_B)/2; (y_A+y_B)/2; (z_A+z_B)/2)</b>. Tại M, khoảng cách tới A bằng tới B.` },

 { emoji:"🚁", mode:"move", drone:{x:0,y:0,z:0},
   text:"Drone xuất phát từ <b>A(1; 0; 2)</b> và bay theo vectơ <b>v = (2; 3; 1)</b>. Đưa drone tới đúng <b>điểm hạ cánh</b>.",
   pts:[{name:"A (xuất phát)",c:{x:1,y:0,z:2},color:'#2A3B8F'}],
   A:{x:1,y:0,z:2}, v:{x:2,y:3,z:1}, target:{x:3,y:3,z:3},
   tip:`Điểm cuối của vectơ: <b>B = A + v</b>, cộng theo từng tọa độ. Độ dài quãng bay |v| = √(2²+3²+1²).` },
];

let lvlIdx=0, score=0, cur=null, drone={x:0,y:0,z:0}, picked=null, attempts=0;
let solved=false;                 // đã giải xong màn hiện tại (để lộ số liệu)
let levelStars={}, starsTotal=0;
let quizCorrect=0, quizAsked=0;
const clearedOnce=new Set(), quizDone=new Set();

/* ===== Báo kết quả về App Luyện Tập (origin giới hạn) ===== */
const SCT_done=new Set();
function SCTreport(){
  var total=LEVELS.length, cleared=SCT_done.size;
  var percent=Math.round(cleared/total*100);
  var payload={source:'SCT_GAME',type:'RESULT',game:'kho-van',
    percent:percent, stars:starsTotal, starsMax:total*3,
    timeSec:(window.SCT_elapsed?window.SCT_elapsed():0),
    quizCorrect:quizCorrect, quizAsked:quizAsked,
    detail:cleared+'/'+total+' nhiệm vụ · '+starsTotal+'/'+(total*3)+' sao · củng cố đúng '+quizCorrect+'/'+quizAsked};
  try{ if(window.opener&&!window.opener.closed) window.opener.postMessage(payload,SCT_TARGET); }catch(e){}
  try{ if(window.parent&&window.parent!==window) window.parent.postMessage(payload,SCT_TARGET); }catch(e){}
}

let A=0.9, E=0.5, dragging=false, lastX=0, lastY=0;
const GRID=6, LOOK={x:3,y:3,z:1.6};

/* ===== Chiếu 3D → 2D ===== */
let cx=0, cy=0, sc=40;
function fit(){
  const cssW=cv.clientWidth, cssH=cssW*(560/900), dpr=window.devicePixelRatio||1;
  cv.width=Math.round(cssW*dpr); cv.height=Math.round(cssH*dpr); ctx.setTransform(dpr,0,0,dpr,0,0);
  cx=cssW/2; cy=cssH*0.6; sc=cssW/12.5;
}
function basis(){
  return { rx:-Math.sin(A), ry:Math.cos(A), rz:0,
           ux:-Math.sin(E)*Math.cos(A), uy:-Math.sin(E)*Math.sin(A), uz:Math.cos(E) };
}
function proj(p){
  const b=basis(), dx=p.x-LOOK.x, dy=p.y-LOOK.y, dz=p.z-LOOK.z;
  return { X:cx+(dx*b.rx+dy*b.ry+dz*b.rz)*sc, Y:cy-(dx*b.ux+dy*b.uy+dz*b.uz)*sc };
}
function line(a,bp,color,w,dash){ ctx.strokeStyle=color;ctx.lineWidth=w||1;ctx.setLineDash(dash||[]);
  const p=proj(a),q=proj(bp); ctx.beginPath();ctx.moveTo(p.X,p.Y);ctx.lineTo(q.X,q.Y);ctx.stroke();ctx.setLineDash([]);}

function drawScene(){
  const cssW=cv.clientWidth, cssH=cssW*(560/900);
  ctx.clearRect(0,0,cssW,cssH);
  for(let i=0;i<=GRID;i++){
    line({x:i,y:0,z:0},{x:i,y:GRID,z:0},'#D5DEEC',1);
    line({x:0,y:i,z:0},{x:GRID,y:i,z:0},'#D5DEEC',1);
  }
  line({x:0,y:0,z:0},{x:GRID,y:0,z:0},COL.x,2.5);
  line({x:0,y:0,z:0},{x:0,y:GRID,z:0},COL.y,2.5);
  line({x:0,y:0,z:0},{x:0,y:0,z:GRID},COL.z,2.5);
  const lx=proj({x:GRID+0.3,y:0,z:0}), ly=proj({x:0,y:GRID+0.3,z:0}), lz=proj({x:0,y:0,z:GRID+0.3});
  ctx.font='bold 14px "Baloo 2"';
  ctx.fillStyle=COL.x;ctx.fillText('x',lx.X,lx.Y); ctx.fillStyle=COL.y;ctx.fillText('y',ly.X,ly.Y);
  ctx.fillStyle=COL.z;ctx.fillText('z',lz.X,lz.Y);
  ctx.fillStyle='#6A7184';ctx.font='12px "Be Vietnam Pro"';const o=proj({x:0,y:0,z:0});ctx.fillText('O',o.X-12,o.Y+14);
  cur.pts.forEach(pt=>drawMarker(pt.c,pt.color,pt.name+(pt.hideCoord?'':` (${pt.c.x};${pt.c.y};${pt.c.z})`),false,pt===pickedObj()));
  if(cur.A&&cur.B) line(cur.A,cur.B,'#9AA6D8',1.5,[5,5]);
  if(cur.mode==="move") drawMarker(drone,'#FF7A1A',`drone (${drone.x};${drone.y};${drone.z})`,true,false);
}
function pickedObj(){ if(cur.mode!=="pick"||!picked) return null; return cur.pts.find(p=>p.name===picked); }

function drawMarker(c,color,label,isDrone,hi){
  const top=proj(c), foot=proj({x:c.x,y:c.y,z:0});
  ctx.strokeStyle=color+'88';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(top.X,top.Y);ctx.lineTo(foot.X,foot.Y);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle=color+'55';ctx.beginPath();ctx.ellipse(foot.X,foot.Y,6,3,0,0,7);ctx.fill();
  const r=isDrone?10:8;
  ctx.fillStyle=color;ctx.strokeStyle='#fff';ctx.lineWidth=2;
  if(isDrone){ ctx.beginPath();ctx.arc(top.X,top.Y,r,0,7);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(top.X,top.Y,3,0,7);ctx.fill(); }
  else { ctx.fillRect(top.X-r,top.Y-r,2*r,2*r);ctx.strokeRect(top.X-r,top.Y-r,2*r,2*r); }
  if(hi){ ctx.strokeStyle='#FF7A1A';ctx.lineWidth=3;ctx.beginPath();ctx.arc(top.X,top.Y,r+6,0,7);ctx.stroke(); }
  ctx.fillStyle='#1C2438';ctx.font='bold 12px "Be Vietnam Pro"';ctx.fillText(label,top.X+r+4,top.Y-r);
}

/* ===== Bảng số liệu =====
   Nguyên tắc chống lộ đáp án: TRƯỚC khi giải xong chỉ hiện công thức
   dạng tổng quát; số liệu thay sẵn / kết quả chỉ hiện SAU khi giải đúng. */
function updateInfo(){
  const L=cur; let h='';
  if(L.mode==="move"){
    $('vx').textContent=drone.x;$('vy').textContent=drone.y;$('vz').textContent=drone.z;
    h+=`Drone: <span class="mono">(${drone.x}; ${drone.y}; ${drone.z})</span><br>`;
  }
  if(lvlIdx===0){ h+=`Hãy xoay khung cảnh để đọc tọa độ kiện hàng — cột đứng cho biết z, bóng trên sàn cho biết (x; y).`; }
  if(lvlIdx===1){
    h+=`P = <span class="mono">(3; 3; 2)</span><br>`;
    if(solved){
      ['Kho A','Kho B','Kho C'].forEach(nm=>{ const k=L.pts.find(p=>p.name===nm);
        const d=dist(L.P,k.c); h+=`${nm}: PK = √${d.s} ≈ <b>${fmt(d.v)}</b><br>`; });
    } else {
      h+=`PK = <span class="mono">√((Δx)² + (Δy)² + (Δz)²)</span><br>Tự tính cho từng kho — nháp ra giấy nhé!`;
    }
  }
  if(lvlIdx===2){
    const dA=dist(drone,L.A), dB=dist(drone,L.B);
    h+= solved ? `M = ((1+5)/2; (1+3)/2; (1+5)/2) = <b>(3; 2; 3)</b><br>`
               : `M = <span class="mono">((x_A+x_B)/2; (y_A+y_B)/2; (z_A+z_B)/2)</span><br>`;
    h+=`Tới A: <span class="mono">${fmt(dA.v)}</span> · Tới B: <span class="mono">${fmt(dB.v)}</span> — bằng nhau chưa đủ, M còn phải nằm trên AB!`;
  }
  if(lvlIdx===3){
    const dv=Math.sqrt(L.v.x**2+L.v.y**2+L.v.z**2);
    h+= solved ? `B = A + v = (1+2; 0+3; 2+1) = <b>(3; 3; 3)</b><br>`
               : `B = <span class="mono">A + v</span> — cộng theo TỪNG tọa độ.<br>A = (1; 0; 2), v = (2; 3; 1)<br>`;
    h+=`|v| = √(4+9+1) = √14 ≈ <b>${fmt(dv)}</b>`;
  }
  $('infoLine').innerHTML=h;
}
function render(){ drawScene(); updateInfo(); }

function buildPicks(){
  const box=$('pickCtrl'); box.innerHTML='';
  ['Kho A','Kho B','Kho C'].forEach(nm=>{
    const k=cur.pts.find(p=>p.name===nm);
    const b=document.createElement('button');
    // KHÔNG in sẵn khoảng cách (bản cũ in ≈ d ngay trên nút → chỉ việc chọn số bé nhất!)
    b.innerHTML=`<span>${nm} (${k.c.x}; ${k.c.y}; ${k.c.z})</span><span class="d">PK = ?</span>`;
    b.onclick=()=>{picked=nm;[...box.children].forEach(c=>c.classList.remove('on'));b.classList.add('on');render();};
    box.appendChild(b);
  });
}
function revealPicks(){
  [...$('pickCtrl').children].forEach(b=>{
    const nm=b.querySelector('span').textContent.split(' (')[0];
    const k=cur.pts.find(p=>p.name===nm);
    if(k) b.querySelector('.d').textContent='≈ '+fmt(dist(cur.P,k.c).v);
  });
}
function setLevel(i){
  lvlIdx=i; cur=LEVELS[i]; attempts=0; picked=null; solved=false;
  drone = cur.drone? {...cur.drone} : {x:0,y:0,z:0};
  $('lvl').textContent=i+1; $('ctxEmoji').textContent=cur.emoji;
  $('ctxText').innerHTML=cur.text + (i===0?'':' <span class="expert">· Tự tính — số liệu chi tiết chỉ hiện sau khi giải đúng!</span>');
  $('score').textContent=score;
  $('tip').innerHTML=cur.tip;
  $('moveCtrl').style.display = cur.mode==="move"?"block":"none";
  $('pickCtrl').style.display = cur.mode==="pick"?"flex":"none";
  $('goBtn').textContent = i===0?"Giao hàng! 🚁" : i===1?"Chọn kho ✅" : i===2?"Đặt trạm! 🛰️" : "Hạ cánh! 🚁";
  if(cur.mode==="pick") buildPicks();
  fit(); render();
}

/* ===== Câu hỏi củng cố Oxyz ===== */
function makeQuiz(){
  const i=lvlIdx; let t;
  if(i===0){
    t={q:'Kiện hàng ở (4; 2; 3). Hình chiếu vuông góc của nó lên mặt sàn (mp Oxy) là điểm nào?',
      correct:'(4; 2; 0) — giữ nguyên x, y; cho z = 0',
      opts:['(4; 2; 0) — giữ nguyên x, y; cho z = 0','(0; 2; 3) — cho x = 0','(4; 0; 3) — cho y = 0','(4; 2; 3) — hình chiếu trùng chính nó'],
      exp:'Chiếu lên mp Oxy tức "thả rơi thẳng đứng": z về 0, x và y giữ nguyên — chính là cái bóng dưới chân cột trong khung cảnh 3D.'};
  } else if(i===1){
    t={q:'Tính khoảng cách từ P(3; 3; 2) đến Kho A(1; 1; 0):',
      correct:'√(2² + 2² + 2²) = √12 ≈ 3,46',
      opts:['√(2² + 2² + 2²) = √12 ≈ 3,46',
            '√(2 + 2 + 2) = √6 ≈ 2,45 (quên bình phương)',
            '2 + 2 + 2 = 6 (quên căn và bình phương)',
            '√(4² + 4² + 2²) = 6 (cộng tọa độ thay vì trừ)'],
      exp:'PA = √((3−1)² + (3−1)² + (2−0)²) = √(4+4+4) = √12 ≈ 3,46. So sánh: PB = √6 ≈ 2,45 (gần nhất), PC = √14 ≈ 3,74.'};
  } else if(i===2){
    t={q:'Trung điểm của đoạn nối A(1; 1; 1) và B(5; 3; 5) là:',
      correct:'(3; 2; 3) — trung bình cộng từng tọa độ',
      opts:['(3; 2; 3) — trung bình cộng từng tọa độ',
            '(2; 1; 2) — lấy (B − A)/2',
            '(6; 4; 6) — cộng tọa độ mà quên chia 2',
            '(4; 2; 4) — trung bình của x và z, giữ nguyên y'],
      exp:'M = ((1+5)/2; (1+3)/2; (1+5)/2) = (3; 2; 3). Lưu ý (B−A)/2 = (2; 1; 2) là NỬA VECTƠ AB chứ không phải trung điểm.'};
  } else {
    t={q:'Từ điểm hạ cánh B(3; 3; 3), drone bay TIẾP một vectơ v = (2; 3; 1) nữa thì tới điểm nào?',
      correct:'(5; 6; 4) — cộng từng tọa độ thêm lần nữa',
      opts:['(5; 6; 4) — cộng từng tọa độ thêm lần nữa',
            '(2; 3; 1) — trùng với vectơ v',
            '(1; 0; 2) — quay về điểm xuất phát A',
            '(6; 9; 3) — nhân ba tọa độ'],
      exp:'C = B + v = (3+2; 3+3; 3+1) = (5; 6; 4). Bay theo cùng v hai lần từ A chính là A + 2v — tọa độ tăng đều như cấp số cộng!'};
  }
  t.opts=shuffle([...new Set(t.opts)]);
  return t;
}
function showQuiz(onDone,nextLabel){
  const qz=makeQuiz(); quizAsked++;
  const q=$('quiz'), box=$('quizBox');
  box.innerHTML=`<div style="font-size:42px">✏️</div>
    <h2 style="color:var(--indigo);font-family:'Baloo 2'">Câu hỏi củng cố</h2>
    <p style="margin-bottom:0">${qz.q}</p>
    <div class="qopts"></div>
    <div class="qexp" style="display:none"></div>
    <button class="next" style="display:none;font-family:'Baloo 2';font-weight:600;border:none;border-radius:12px;padding:13px;cursor:pointer">${nextLabel}</button>`;
  const wrap=box.querySelector('.qopts');
  const expEl=box.querySelector('.qexp');
  const nextBtn=box.querySelector('button.next');
  qz.opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='qopt'; b.textContent=o;
    b.onclick=()=>{
      wrap.querySelectorAll('button').forEach(xx=>{
        xx.disabled=true;
        if(xx.textContent===qz.correct) xx.classList.add('correct');
      });
      const okA=(o===qz.correct);
      if(!okA){ b.classList.add('wrong'); SFX.buzz(); }
      else{ quizCorrect++; score+=50; $('score').textContent=score; SFX.ding(); }
      expEl.style.display='block';
      expEl.innerHTML=(okA?'✅ Chính xác! +50 điểm. ':'❌ Chưa đúng. ')+qz.exp;
      nextBtn.style.display='block';
      SCTreport();
    };
    wrap.appendChild(b);
  });
  nextBtn.onclick=()=>{ q.className='toast'; onDone(); };
  q.className='toast show';
}

function finalToast(){
  const time=window.SCT_elapsed?fmtT(window.SCT_elapsed()):'—';
  showToast(true,'🏆','Trưởng kho không gian!',
    `Hoàn thành cả ${LEVELS.length} nhiệm vụ: ${score} điểm · ${starsTotal}/${LEVELS.length*3} ⭐ · củng cố đúng ${quizCorrect}/${quizAsked} · thời gian ${time}. Oxyz giờ là sân nhà của bạn!`,
    'Chơi lại từ đầu','next',
    ()=>{ score=0; setLevel(0); });
}

function go(){
  const L=cur; let ok;
  if(L.mode==="pick"){ if(!picked){SFX.buzz();return;} ok = picked===L.answer; }
  else ok = eq(drone, L.target);
  if(ok){
    solved=true;
    if(L.mode==="pick") revealPicks();
    const s=attempts===0?3:attempts===1?2:1;
    levelStars[lvlIdx]=Math.max(s,levelStars[lvlIdx]||0);
    starsTotal=Object.values(levelStars).reduce((a,b)=>a+b,0);
    $('stars').textContent=starsTotal;
    if(!clearedOnce.has(lvlIdx)){ score+=100; $('score').textContent=score; clearedOnce.add(lvlIdx); }
    SCT_done.add(lvlIdx); SCTreport();
    SFX.win(); confetti(); render();
    const last=lvlIdx===LEVELS.length-1;
    let msg=lvlIdx===1?`Kho B gần nhất: PB = √6 ≈ ${fmt(Math.sqrt(6))} (PA = √12, PC = √14).`
           :`Đúng vị trí (${L.target.x}; ${L.target.y}; ${L.target.z}) sau ${attempts+1} lượt — đạt ${'⭐'.repeat(s)}.`;
    const goNext=()=>{ last ? finalToast() : setLevel(lvlIdx+1); };
    if(quizDone.has(lvlIdx)){
      showToast(true,'★'.repeat(s)+'☆'.repeat(3-s),'Hoàn thành!',msg,
        last?'Xem tổng kết 🏆':'Nhiệm vụ tiếp','next',goNext);
    } else {
      quizDone.add(lvlIdx);
      showToast(true,'★'.repeat(s)+'☆'.repeat(3-s),'Hoàn thành!',msg,
        'Câu hỏi củng cố ✏️','next',
        ()=>showQuiz(goNext, last?'Xem tổng kết 🏆':'Nhiệm vụ tiếp'));
    }
  } else {
    attempts++;
    SFX.fail();
    let msg;
    if(L.mode==="pick"){
      msg="Chưa phải kho gần nhất — tính lại khoảng cách bằng công thức, đừng tin vào mắt!";
      if(attempts>=2) msg+=` Gợi ý: PA² = (3−1)²+(3−1)²+(2−0)² = 12. Tính tương tự PB², PC² rồi so sánh (so bình phương là đủ, khỏi khai căn).`;
    } else if(lvlIdx===0){
      msg="Chưa đúng vị trí. Xoay khung cảnh: nhìn từ trên xuống để đọc (x; y), nhìn ngang để đếm độ cao z theo cột đứng.";
    } else if(lvlIdx===2){
      msg="Chưa đúng trung điểm. Hai khoảng cách bằng nhau chưa đủ — M phải nằm ngay trên đoạn AB.";
      if(attempts>=2) msg+=" Gợi ý: M = ((1+5)/2; (1+3)/2; (1+5)/2) — tự rút gọn nhé.";
    } else {
      msg="Chưa đúng điểm hạ cánh. Cộng vectơ theo TỪNG tọa độ: x với x, y với y, z với z.";
      if(attempts>=2) msg+=" Gợi ý: B = (1+2; 0+3; 2+1).";
    }
    showToast(false,'','Chưa đạt',msg,'Thử lại','retry',()=>{});
  }
}
function showToast(ok,star,title,msg,btn,cls,act){
  const t=$('toast');
  t.className='toast show'+(ok?'':' fail');
  $('tStars').textContent=star; $('tStars').style.display=ok&&star?'block':'none';
  $('tTitle').textContent=title; $('tMsg').innerHTML=msg;
  const b=$('tBtn'); b.textContent=btn; b.className=cls; b.onclick=()=>{t.className='toast';act();};
}

// điều khiển drone
$('moveCtrl').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  const a=b.dataset.a, d=+b.dataset.d; drone[a]=Math.max(0,Math.min(GRID,drone[a]+d)); render();});
$('goBtn').addEventListener('click',go);
$('resetBtn').addEventListener('click',()=>{score=0;$('toast').className='toast';$('quiz').className='toast';setLevel(0);});

// xoay
cv.addEventListener('pointerdown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;cv.setPointerCapture(e.pointerId);});
cv.addEventListener('pointermove',e=>{ if(!dragging)return;
  A+=(e.clientX-lastX)*0.01; E+=(e.clientY-lastY)*0.01;
  E=Math.max(0.12,Math.min(1.45,E)); lastX=e.clientX;lastY=e.clientY; drawScene(); });
cv.addEventListener('pointerup',()=>dragging=false);
cv.addEventListener('pointercancel',()=>dragging=false);
window.addEventListener('resize',()=>{fit();render();});
window.addEventListener('keydown',e=>{
  if(e.key==='Enter' && !$('toast').classList.contains('show') && !$('quiz').classList.contains('show'))
    go();
});

$('lvlMax').textContent=LEVELS.length;
$('starsMax').textContent=LEVELS.length*3;
setLevel(0);
</script>

<script>
/* ==== Đồng hồ đo thời gian chơi (bản cũ THIẾU khối này) ==== */
(function(){
  var sec=0, started=false, running=false;
  function fmt(s){var m=Math.floor(s/60);return m+':'+String(s%60).padStart(2,'0');}
  var chip=document.createElement('span');
  chip.className='sct-timer';
  chip.innerHTML='⏱ <b id="sctClock">0:00</b>';
  function mount(){
    var host=document.querySelector('.hud')||document.querySelector('.top');
    if(host){ host.appendChild(chip); }
    else{ chip.style.position='fixed'; chip.style.top='12px'; chip.style.right='12px';
          chip.style.zIndex='99'; document.body.appendChild(chip); }
  }
  function tick(){ if(running){ sec++; var c=document.getElementById('sctClock'); if(c) c.textContent=fmt(sec); } }
  function start(){ if(started) return; started=true; running=true; setInterval(tick,1000); }
  document.addEventListener('visibilitychange',function(){ running = started && !document.hidden; });
  ['pointerdown','keydown','input','change'].forEach(function(ev){ document.addEventListener(ev,start); });
  window.SCT_elapsed=function(){ return sec; };
  if(document.readyState!=='loading') mount();
  else document.addEventListener('DOMContentLoaded',mount);
})();
</script>
